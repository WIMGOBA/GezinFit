<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#2ECC71">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gezinfit">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Gezinfit</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.20.0/umd/index.min.js"></script>
<style>
html{overflow-x:hidden;width:100%;position:relative}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
body{overflow-x:hidden;width:100%;max-width:100vw;position:relative;min-height:100vh}
:root{
  --bg:#F0FBF4;--surf:#fff;--surf2:#E8F8EE;--surf3:#D4F0DF;
  --border:rgba(39,174,96,0.15);--border2:rgba(39,174,96,0.3);
  --text:#1A3A26;--muted:#6B9E7A;--muted2:#A8CDB5;
  --green:#2ECC71;--green2:#27AE60;--green3:#1AAF5D;
  --boks:#6C63FF;--danger:#E74C3C;--amber:#F39C12;
  --r:16px;--rsm:10px;
  --shadow:0 4px 20px rgba(46,204,113,0.15);
  --shadow-sm:0 2px 10px rgba(0,0,0,0.07);
  --shadow-card:0 3px 14px rgba(39,174,96,0.1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}
.app{display:flex;flex-direction:column;height:100dvh}
.header{padding:calc(env(safe-area-inset-top,0px) + 16px) 16px 14px;background:linear-gradient(135deg,#2ECC71,#27AE60,#1AAF5D);flex-shrink:0;box-shadow:0 4px 20px rgba(46,204,113,0.35)}
.header-row{display:flex;align-items:center;justify-content:space-between}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:rgba(255,255,255,0.2);border-radius:10px;display:flex;align-items:center;justify-content:center;border:1.5px solid rgba(255,255,255,0.35);flex-shrink:0}
.logo-text{font-size:20px;font-weight:800;color:#fff;letter-spacing:-.5px}
.logo-text span{color:rgba(255,255,255,0.72)}
.logo-sub{font-size:10px;color:rgba(255,255,255,0.75);margin-top:1px;font-weight:500}
.hdr-btn{background:rgba(255,255,255,0.2);border:1.5px solid rgba(255,255,255,0.4);border-radius:10px;color:#fff;font-size:11px;font-weight:700;cursor:pointer;padding:6px 10px;white-space:nowrap;display:flex;align-items:center;gap:4px}
.navbar{display:flex;background:#fff;border-bottom:1.5px solid var(--border);flex-shrink:0;box-shadow:var(--shadow-sm)}
.nav-btn{flex:1;padding:10px 2px 8px;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;color:var(--muted2);cursor:pointer;border:none;background:transparent;font-weight:600}
.nav-btn.active{color:var(--green2)}
.nav-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.day-tabs{background:#fff;padding:9px 12px 0;border-bottom:1.5px solid var(--border);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.day-tabs::-webkit-scrollbar{display:none}
.day-tabs-inner{display:flex;gap:5px;width:max-content;padding-bottom:9px}
.dtab{padding:7px 15px;border-radius:20px;font-size:12px;font-weight:700;border:1.5px solid transparent;color:var(--muted);cursor:pointer;background:transparent;white-space:nowrap;transition:.2s}
.dtab.active{color:#fff;border-color:var(--green);background:var(--green);box-shadow:0 3px 10px rgba(46,204,113,0.4)}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 40px;background:var(--bg)}
.card{background:#fff;border:1.5px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow-card)}
.card.open{border-color:var(--green)}
.card-head{padding:13px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.card-title{font-size:14px;font-weight:700;line-height:1.3;flex:1;color:var(--text)}
.chevron{color:var(--muted2);font-size:16px;transition:transform .25s;line-height:1}
.card.open .chevron{transform:rotate(90deg);color:var(--green)}
.chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.chip{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px}
.ck{background:#EEF0FF;color:#5C6BC0}.cp{background:#E8F8EE;color:var(--green2)}
.ct{background:#F5F5F0;color:#9B7B5A}.clc{background:#FFF8E1;color:#F57F17}
.cgv{background:#E8F5E9;color:#388E3C}.cvote{background:#E8F8EE;color:var(--green2);font-weight:700}
.card-body{display:none;padding:0 14px 14px}
.card.open .card-body{display:block}
.sec-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted2);margin:12px 0 7px}
.portions-row{display:flex;align-items:center;gap:10px;background:var(--surf2);border-radius:var(--rsm);padding:8px 12px;border:1px solid var(--border);margin-bottom:8px}
.portions-lbl{font-size:12px;color:var(--muted);flex:1;font-weight:500}
.portions-val{font-size:18px;font-weight:800;color:var(--green2);min-width:24px;text-align:center}
.port-btn{background:var(--green);border:none;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;cursor:pointer;flex-shrink:0}
.macro-bar{display:flex;gap:6px;margin-bottom:8px}
.mbar-item{flex:1;background:linear-gradient(135deg,var(--surf2),var(--surf3));border-radius:var(--rsm);padding:7px 6px;text-align:center;border:1px solid var(--border)}
.mbar-val{font-size:14px;font-weight:800;color:var(--green2)}
.mbar-lbl{font-size:9px;color:var(--muted);margin-top:1px;font-weight:500}
.ing-list{display:flex;flex-direction:column}
.ing-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.ing-row:last-child{border:none}
.ing-name{color:var(--text);flex:1;font-size:13px}
.ing-amount{color:var(--muted);font-size:12px;font-weight:600;margin-left:8px}
.steps{display:flex;flex-direction:column;gap:9px}
.step{display:flex;gap:9px;font-size:13px;line-height:1.6;color:var(--text)}
.snum{width:22px;height:22px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;margin-top:1px}
.tip-box{background:linear-gradient(135deg,#FFFDE7,#FFF9C4);border:1.5px solid #FFE082;border-radius:var(--rsm);padding:9px 12px;font-size:12px;color:#5D4037;line-height:1.6;margin-top:12px;font-weight:500}
.gv-banner{background:linear-gradient(135deg,#E8F5E9,#F1F8E9);border:1.5px solid #A5D6A7;border-radius:var(--rsm);padding:7px 11px;font-size:11px;color:#2E7D32;margin-bottom:12px;font-weight:600}
.vote-btn{width:100%;padding:12px;border-radius:var(--rsm);background:linear-gradient(135deg,#FFE082,#FFD54F);border:none;color:#5D4037;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 3px 12px rgba(255,213,79,0.4);margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:8px}
.winner-banner{background:linear-gradient(135deg,#E8F8EE,#D4F0DF);border:2px solid var(--green);border-radius:var(--r);padding:12px 14px;margin-bottom:12px}
.uieten-row{display:flex;gap:8px;margin-bottom:12px}
.uieten-btn{flex:1;padding:9px;border-radius:var(--rsm);border:1.5px solid var(--border2);background:#fff;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer}
.uieten-btn.active{border-color:var(--green);background:linear-gradient(135deg,#E8F8EE,#D4F0DF);color:var(--green2)}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-head h2{font-size:18px;font-weight:800;color:var(--text)}
.grocery-section{background:#fff;border:1.5px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow-card)}
.grocery-head{padding:11px 14px;font-size:12px;font-weight:700;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.grocery-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border);font-size:13px;cursor:pointer}
.grocery-item:last-child{border:none}
.grocery-item.done .grocery-name{text-decoration:line-through;color:var(--muted2)}
.grocery-name{flex:1}.grocery-amount{color:var(--muted);font-size:12px;font-weight:600}
.clear-btn{background:none;border:1.5px solid var(--border2);border-radius:var(--rsm);padding:5px 10px;color:var(--muted);font-size:11px;cursor:pointer;font-weight:600}
.empty-state{text-align:center;padding:50px 20px;color:var(--muted2)}
.empty-state .icon{font-size:44px;margin-bottom:14px}
.empty-state p{font-size:13px;line-height:1.7;color:var(--muted)}
.form-section{background:#fff;border:1.5px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--shadow-card)}
.form-title{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text)}
.field{margin-bottom:10px}
.field label{display:block;font-size:10px;color:var(--muted);margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.field input,.field select,.field textarea{width:100%;background:var(--surf2);border:1.5px solid var(--border2);border-radius:var(--rsm);padding:9px 11px;color:var(--text);font-size:13px;font-family:inherit;font-weight:500}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--green)}
.field textarea{min-height:70px;resize:vertical;line-height:1.5}
.ing-form-row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.ing-form-row input{flex:1;min-width:0}
.ing-form-row input.sm{width:70px;flex:none}
.remove-ing{background:none;border:none;color:var(--danger);font-size:18px;cursor:pointer;flex-shrink:0}
.day-checks{display:flex;flex-wrap:wrap;gap:6px}
.day-check{display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;font-weight:500}
.day-check input{accent-color:var(--green)}
.submit-btn{width:100%;padding:13px;border-radius:var(--rsm);background:linear-gradient(135deg,#2ECC71,#27AE60);border:none;color:#fff;font-size:14px;font-weight:800;cursor:pointer;margin-top:4px;box-shadow:0 4px 15px rgba(46,204,113,0.4)}
.add-ing-btn{background:none;border:1.5px dashed var(--border2);border-radius:var(--rsm);width:100%;padding:7px;color:var(--muted);font-size:12px;cursor:pointer;margin-bottom:8px;font-weight:600}
.toggle-row{display:flex;background:var(--surf2);border-radius:20px;padding:3px}
.toggle-opt{flex:1;padding:6px;text-align:center;font-size:12px;font-weight:700;color:var(--muted);border-radius:17px;cursor:pointer}
.toggle-opt.active{background:#fff;color:var(--text);box-shadow:var(--shadow-sm)}
.loading-bar{display:flex;align-items:center;gap:10px;padding:12px;background:var(--surf2);border-radius:var(--rsm);margin-top:10px;font-size:13px;color:var(--muted);font-weight:500}
.spinner{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
/* DAG */
.person-dag-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow-card)}
.person-dag-card.open{border-color:var(--green)}
.person-dag-head{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.person-dag-emoji{width:34px;height:34px;border-radius:50%;background:var(--surf2);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.person-dag-info{flex:1}
.person-dag-name{font-size:14px;font-weight:700;color:var(--text)}
.person-dag-sub{font-size:11px;color:var(--muted);margin-top:1px;font-weight:500}
.person-dag-right{text-align:right;flex-shrink:0}
.person-dag-kcal{font-size:15px;font-weight:800}
.person-dag-kcal.ok{color:var(--green2)}.person-dag-kcal.warn{color:var(--amber)}.person-dag-kcal.over{color:var(--danger)}
.person-dag-body{display:none;padding:10px 14px;border-top:1px solid var(--border)}
.person-dag-card.open .person-dag-body{display:block}
.prog-wrap{padding:4px 14px 8px}
.prog-bar{height:6px;background:var(--surf3);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#2ECC71,#27AE60);transition:.4s;max-width:100%}
.prog-fill.warn{background:linear-gradient(90deg,#F39C12,#E67E22)}.prog-fill.over{background:linear-gradient(90deg,#E74C3C,#C0392B)}
.moment-block{background:var(--surf2);border-radius:var(--rsm);padding:10px 12px;margin-bottom:8px;border:1px solid var(--border)}
.moment-head-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.moment-label{font-size:12px;font-weight:700;color:var(--text)}
.moment-kcal{font-size:11px;font-weight:700;color:var(--green2)}
.moment-items{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.moment-item{display:flex;align-items:center;gap:6px;font-size:12px;padding:5px 8px;background:#fff;border-radius:6px}
.moment-item-name{flex:1;font-weight:500;color:var(--text)}
.moment-item-macros{font-size:10px;color:var(--muted);font-weight:600}
.moment-item-del{background:none;border:none;color:var(--danger);font-size:14px;cursor:pointer;padding:0;flex-shrink:0}
.moment-add-row{display:flex;gap:5px;flex-wrap:wrap}
.m-add-btn{display:flex;align-items:center;gap:3px;padding:5px 10px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid var(--border2);background:#fff;color:var(--muted);cursor:pointer;white-space:nowrap}
.m-add-btn.g{border-color:var(--green);background:rgba(46,204,113,0.08);color:var(--green2)}
.m-add-btn.p{border-color:var(--boks);background:rgba(108,99,255,0.08);color:var(--boks)}
.quick-form{background:#fff;border-radius:var(--rsm);padding:9px;margin-top:7px;border:1px solid var(--border2)}
.quick-row{display:flex;gap:5px;margin-bottom:6px}
.quick-row input{flex:1;background:var(--surf2);border:1.5px solid var(--border2);border-radius:var(--rsm);padding:7px 9px;color:var(--text);font-size:12px;font-family:inherit;font-weight:500}
.quick-row input.sm{width:65px;flex:none}
.quick-save{padding:7px 12px;border-radius:var(--rsm);background:var(--green);border:none;color:#fff;font-size:11px;font-weight:700;cursor:pointer}
.dag-top{background:linear-gradient(135deg,var(--surf2),var(--surf3));border-radius:var(--rsm);padding:10px 12px;margin-bottom:12px;border:1.5px solid var(--border)}
.dag-top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.dag-top-title{font-size:13px;font-weight:700;color:var(--text)}
.dag-totals{display:flex;gap:7px}
.dag-total{flex:1;background:#fff;border-radius:8px;padding:6px 8px;text-align:center;border:1px solid var(--border)}
.dag-total .v{font-size:14px;font-weight:800;color:var(--green2)}
.dag-total .l{font-size:9px;color:var(--muted);font-weight:600}
.toggle-sw{width:40px;height:22px;border-radius:11px;background:var(--surf3);border:none;cursor:pointer;position:relative;transition:.2s;flex-shrink:0}
.toggle-sw.on{background:var(--green)}
.toggle-sw::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:2px;left:2px;transition:.2s;box-shadow:0 1px 4px rgba(0,0,0,0.2)}
.toggle-sw.on::after{left:20px}
/* SCANNER */
.scanner-overlay{position:fixed;inset:0;background:#000;z-index:2000;display:flex;flex-direction:column}
.scanner-header{padding:52px 16px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.scanner-title{font-size:16px;font-weight:800;color:#fff}
.scanner-close{background:rgba(255,255,255,0.2);border:none;color:#fff;font-size:24px;cursor:pointer;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.scanner-viewport{flex:1;position:relative;overflow:hidden}
.scanner-viewport video{width:100%;height:100%;object-fit:cover}
.scanner-line{position:absolute;left:10%;right:10%;height:2px;background:var(--green);box-shadow:0 0 8px rgba(46,204,113,0.8);animation:scanline 2s ease-in-out infinite;top:50%}
@keyframes scanline{0%,100%{transform:translateY(-60px)}50%{transform:translateY(60px)}}
.scanner-frame{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.scanner-box{width:240px;height:160px;border:2px solid rgba(46,204,113,0.8);border-radius:12px;box-shadow:0 0 0 9999px rgba(0,0,0,0.5)}
.scanner-hint{position:absolute;bottom:0;left:0;right:0;padding:16px;text-align:center;color:rgba(255,255,255,0.85);font-size:13px;font-weight:500;background:linear-gradient(transparent,rgba(0,0,0,0.7))}
.scanner-result{position:absolute;bottom:0;left:0;right:0;background:#fff;border-radius:24px 24px 0 0;padding:18px;transform:translateY(100%);transition:.3s;max-height:70vh;overflow-y:auto}
.scanner-result.show{transform:translateY(0)}
.scanner-macros{display:flex;gap:7px;margin:10px 0}
.scanner-macro{flex:1;background:var(--surf2);border-radius:var(--rsm);padding:7px;text-align:center}
.scanner-macro .v{font-size:15px;font-weight:800;color:var(--green2)}
.scanner-macro .l{font-size:9px;color:var(--muted);font-weight:600}
.scanner-person-btns{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.scanner-person-btn{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--border2);background:#fff;color:var(--muted);cursor:pointer}
.scanner-person-btn.sel{border-color:var(--green);background:var(--green);color:#fff}
.scanner-add-btn{width:100%;padding:12px;border-radius:var(--rsm);background:linear-gradient(135deg,#2ECC71,#27AE60);border:none;color:#fff;font-size:14px;font-weight:800;cursor:pointer;margin-top:8px}
/* AUTH */
.auth-screen{position:fixed;inset:0;background:linear-gradient(135deg,#2ECC71,#27AE60,#1AAF5D);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;z-index:5000;overflow-y:auto}
.auth-card{background:#fff;border-radius:24px;padding:24px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
.auth-tabs{display:flex;background:var(--surf2);border-radius:12px;padding:3px;margin-bottom:20px}
.auth-tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:700;color:var(--muted);border-radius:10px;cursor:pointer;transition:.2s}
.auth-tab.active{background:#fff;color:var(--text);box-shadow:var(--shadow-sm)}
.auth-field{margin-bottom:12px}
.auth-field label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.auth-field input{width:100%;background:var(--surf2);border:1.5px solid var(--border2);border-radius:var(--rsm);padding:12px 14px;color:var(--text);font-size:15px;font-family:inherit;font-weight:500}
.auth-field input:focus{outline:none;border-color:var(--green)}
.auth-btn{width:100%;padding:14px;border-radius:var(--rsm);background:linear-gradient(135deg,#2ECC71,#27AE60);border:none;color:#fff;font-size:15px;font-weight:800;cursor:pointer;margin-top:4px;box-shadow:0 4px 15px rgba(46,204,113,0.4)}
.auth-btn:disabled{opacity:.6;cursor:not-allowed}
.auth-error{background:#FFEBEE;border:1px solid #FFCDD2;border-radius:var(--rsm);padding:10px 12px;font-size:12px;color:#C62828;margin-bottom:12px;font-weight:500;display:none}
.auth-error.show{display:block}
/* SETUP */
.setup-screen{position:fixed;inset:0;background:linear-gradient(135deg,#2ECC71,#27AE60);display:flex;flex-direction:column;align-items:center;padding:60px 24px 40px;z-index:4000;overflow-y:auto}
.setup-card{background:#fff;border-radius:24px;padding:20px;width:100%;max-width:400px;margin-bottom:16px}
.setup-member-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:10px;background:var(--surf2);border-radius:14px;padding:10px 12px}
.setup-emoji-btn{width:40px;height:40px;border-radius:50%;background:#fff;border:1.5px solid var(--border2);font-size:20px;cursor:pointer;flex-shrink:0}
.setup-fields{flex:1;display:flex;flex-direction:column;gap:6px}

// AUTH
function showAuthTab(t){
  document.getElementById('login-form').style.display=t==='login'?'block':'none';
  document.getElementById('register-form').style.display=t==='register'?'block':'none';
  document.getElementById('auth-error').className='auth-error';
}
function showLoginOnly(){
  showAuthTab('login');
}
function showErr(msg){const e=document.getElementById('auth-error');e.textContent=msg;e.className='auth-error show';}

async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pw=document.getElementById('login-password').value;
  if(!email||!pw){showErr('Vul alle velden in.');return;}
  const btn=document.getElementById('login-btn');btn.disabled=true;btn.textContent='Inloggen...';
  try{
    const{data,error}=await sb.auth.signInWithPassword({email,password:pw});
    if(error){showErr(error.message);btn.disabled=false;btn.textContent='Inloggen';return;}
    if(data?.user){
      btn.textContent='Laden...';
      await loadData(data.user);
    }
  }catch(e){showErr('Verbindingsfout: '+e.message);btn.disabled=false;btn.textContent='Inloggen';}
}

async function doRegister(){
  const name=document.getElementById('reg-name').value.trim();
  const email=document.getElementById('reg-email').value.trim();
  const pw=document.getElementById('reg-password').value;
  if(!name||!email||!pw){showErr('Vul alle velden in.');return;}
  if(pw.length<6){showErr('Wachtwoord minimaal 6 tekens.');return;}

  // Only allow registration via invite link or new family link
  const params=new URLSearchParams(window.location.search);
  if(!params.get('invite') && !params.get('newgezin')){
    showErr('Je hebt een uitnodigingslink nodig om een account aan te maken.');
    return;
  }
  const btn=document.getElementById('reg-btn');btn.disabled=true;btn.textContent='Account aanmaken...';
  try{
    const{data,error}=await sb.auth.signUp({email,password:pw,options:{data:{name}}});
    if(error){showErr(error.message);btn.disabled=false;btn.textContent='Account aanmaken';return;}
    if(data?.user){
      const params=new URLSearchParams(window.location.search);
      const inviteToken=params.get('invite');
      const newGezin=params.get('newgezin');
      if(inviteToken) await joinFamily(data.user,name,inviteToken);
      else showSetup(data.user,name); // newgezin or first user — both go to setup
    } else {
      showErr('Account aangemaakt! Controleer je e-mail of log direct in.');
      btn.disabled=false;btn.textContent='Account aanmaken';
    }
  }catch(e){showErr('Fout: '+e.message);btn.disabled=false;btn.textContent='Account aanmaken';}
}

async function joinFamily(u,name,token){
  const{data:inv,error:invErr}=await sb.from('invitations').select('*').eq('token',token).eq('used',false).single();
  if(invErr||!inv){
    showErr('Uitnodiging ongeldig of al gebruikt. Vraag een nieuwe link aan de hoofdgebruiker.');
    return;
  }
  
  // Show member picker — who are you in this family?
  const{data:existing}=await sb.from('family_members')
    .select('*').eq('family_id',inv.family_id).is('user_id',null);
  
  if(!existing||!existing.length){
    // No unlinked members — add as new member
    const emoji=OB_EMOJIS[Math.floor(Math.random()*8)];
    await sb.from('family_members').insert({family_id:inv.family_id,user_id:u.id,name,emoji});
    await sb.from('invitations').update({used:true}).eq('id',inv.id);
    window.history.replaceState({},'',window.location.pathname);
    await loadData(u);
    return;
  }

  // Show picker: which family member are you?
  document.getElementById('auth-screen').style.display='none';
  const ex=document.getElementById('member-picker');if(ex)ex.remove();
  const sc=document.createElement('div');sc.id='member-picker';
  sc.style.cssText='position:fixed;inset:0;background:linear-gradient(135deg,#2ECC71,#27AE60);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;z-index:4000;overflow-y:auto';
  sc.innerHTML=`
    <div style="font-size:48px;margin-bottom:16px">👋</div>
    <h1 style="font-size:24px;font-weight:800;color:#fff;margin-bottom:8px;text-align:center">Welkom ${name}!</h1>
    <p style="font-size:14px;color:rgba(255,255,255,0.9);margin-bottom:28px;text-align:center;line-height:1.6">Wie ben jij in het gezin?</p>
    <div style="width:100%;max-width:400px">
      ${existing.map(m=>`
        <div onclick="linkMember('${m.id}','${inv.id}','${u.id}')" style="background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;display:flex;align-items:center;gap:14px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,0.1)">
          <div style="font-size:32px">${m.emoji}</div>
          <div style="flex:1">
            <div style="font-size:16px;font-weight:800;color:var(--text)">${m.name}</div>
            <div style="font-size:12px;color:var(--muted);font-weight:500">${m.dob?'Geboren '+new Date(m.dob).toLocaleDateString('nl-NL'):'Geen geboortedatum'}</div>
          </div>
          <div style="font-size:22px;color:var(--green2)">›</div>
        </div>`).join('')}
      <div onclick="linkMember('new','${inv.id}','${u.id}')" style="background:rgba(255,255,255,0.2);border-radius:16px;padding:16px;margin-bottom:12px;display:flex;align-items:center;gap:14px;cursor:pointer;border:2px dashed rgba(255,255,255,0.5)">
        <div style="font-size:32px">➕</div>
        <div style="flex:1"><div style="font-size:16px;font-weight:700;color:#fff">Ik sta er niet tussen</div><div style="font-size:12px;color:rgba(255,255,255,0.8);font-weight:500">Voeg mij toe als nieuw lid</div></div>
      </div>
    </div>
    <button onclick="document.getElementById('member-picker').remove();signOut()" style="background:none;border:none;color:rgba(255,255,255,0.8);font-size:13px;cursor:pointer;font-weight:600;text-decoration:underline;margin-top:8px">Annuleren</button>`;
  document.body.appendChild(sc);
  window._pendingInvite = {invId:inv.id, userId:u.id, familyId:inv.family_id, name};
}

async function linkMember(memberId, invId, userId){
  const pending = window._pendingInvite;
  document.getElementById('member-picker')?.remove();
  if(memberId==='new'){
    const emoji=OB_EMOJIS[Math.floor(Math.random()*8)];
    await sb.from('family_members').insert({family_id:pending.familyId,user_id:userId,name:pending.name,emoji});
  } else {
    await sb.from('family_members').update({user_id:userId}).eq('id',memberId);
  }
  await sb.from('invitations').update({used:true}).eq('id',invId);
  window.history.replaceState({},'',window.location.pathname);
  await loadData(user);
}


async function signOut(){
  if(realtimeCh) sb.removeChannel(realtimeCh);
  await sb.auth.signOut();
  user=null;family=null;member=null;members=[];recipes=[];votes={};dayLogs={};
  document.getElementById('app').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
}

    </div>
    <div style="background:rgba(255,255,255,0.15);border-radius:16px;padding:20px;width:100%;max-width:400px;border:1.5px solid rgba(255,255,255,0.3);margin-bottom:24px">
      <div style="font-size:13px;color:rgba(255,255,255,0.9);font-weight:600;margin-bottom:8px">🏠 Nieuw gezin starten?</div>

function setupRow(i,emoji,name,dob){
  return `<div id="setup-row-${i}" class="setup-member-row">
    <button class="setup-emoji-btn" id="setup-emoji-${i}" onclick="cycleEmoji(${i})">${emoji}</button>
    <div class="setup-fields">
      <input type="text" class="setup-name-input" id="setup-name-${i}" placeholder="Naam" value="${name}">
      <input type="date" class="setup-dob-input" id="setup-dob-${i}" value="${dob}">
    </div>
    ${i>0?`<button class="setup-del" onclick="document.getElementById('setup-row-${i}').remove()">×</button>`:''}
  </div>`;
}

function cycleEmoji(i){const b=document.getElementById('setup-emoji-'+i);if(!b)return;const c=OB_EMOJIS.indexOf(b.textContent);b.textContent=OB_EMOJIS[(c+1)%OB_EMOJIS.length];}

function addSetupRow(){
  const c=document.getElementById('setup-members');const i=setupCount++;
  const d=document.createElement('div');d.innerHTML=setupRow(i,OB_EMOJIS[i%OB_EMOJIS.length],'','');
  c.appendChild(d.children[0]);
}

async function saveSetup(){
  const fname=document.getElementById('setup-fname')?.value?.trim()||'Mijn Gezin';
  const mems=[];
  for(let i=0;i<setupCount;i++){
    const n=document.getElementById('setup-name-'+i);
    const e=document.getElementById('setup-emoji-'+i);
    const d=document.getElementById('setup-dob-'+i);
    if(n&&n.value.trim()) mems.push({name:n.value.trim(),emoji:e?.textContent||'👤',dob:d?.value||null,is_admin:i===0});
  }
  if(!mems.length){alert('Voeg minimaal één gezinslid toe.');return;}
  const{data:fam,error:fe}=await sb.from('families').insert({name:fname}).select().single();
  if(fe){alert('Fout: '+fe.message);return;}
  // Eerste lid = huidige gebruiker met account, rest zonder user_id
  // Ze kunnen later via uitnodiging inloggen
  const memberRows = mems.map((m,i)=>({
    family_id:fam.id,
    user_id: i===0 ? setupUser.id : null,
    name:m.name,
    emoji:m.emoji,
    dob:m.dob,
    is_admin: i===0
  }));
  await sb.from('family_members').insert(memberRows);
  await sb.from('recipes').insert(DEFAULT_RECIPES.map(r=>({...r,family_id:fam.id,is_default:true})));
  document.getElementById('setup-screen')?.remove();
  await loadData(setupUser);
}

// LOAD DATA
async function loadData(u){
  user=u;
  const{data:m}=await sb.from('family_members').select('*,families(*)').eq('user_id',u.id).single();
  if(!m){
    // Check if this is the first user ever (no families exist yet)
    // If so, show setup. Otherwise show "need invite" screen.
    const{data:anyFamily}=await sb.from('families').select('id').limit(1);
    // New user without family - check if they came from an invite
    const params=new URLSearchParams(window.location.search);
    if(params.get('invite')){
      // They have an invite token but already registered - process it
      await joinFamily(u, u.user_metadata?.name||'Gebruiker', params.get('invite'));
      return;
    }
    // Show no-access screen with option to create new family
    showNoAccessScreen(u);
    return;
  }
  member=m;family=m.families;
  document.getElementById('family-title').innerHTML=family.name+' <span>Menu</span>';
  document.getElementById('user-sub').textContent=member.emoji+' '+member.name;
  await Promise.all([loadMembers(),loadRecipes(),loadVotes(),loadDayLogs()]);
  loadGroceries();
  setupRealtime();
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  const t=new Date().getDay();activeDay=t===0?6:t-1;
  switchTab('menu');
}

async function loadMembers(){const{data}=await sb.from('family_members').select('*').eq('family_id',family.id).order('created_at');members=data||[];}
async function loadGlobalRecipes(limit=50){
  try {
    const{data} = await sb.from('global_recipes')
      .select('*')
      .eq('approved', true)
      .order('times_used', {ascending: false})
      .limit(limit);
    return data || [];
  } catch(e){ return []; }
}

async function loadRecipes(){const{data}=await sb.from('recipes').select('*').eq('family_id',family.id).order('created_at');recipes=data||[];}
async function loadVotes(){
  const today=new Date().toISOString().split('T')[0];
  const{data}=await sb.from('votes').select('*,family_members(name,emoji)').eq('family_id',family.id).eq('vote_date',today);
  votes={};(data||[]).forEach(v=>{if(!votes[v.recipe_id])votes[v.recipe_id]=[];votes[v.recipe_id].push({member_id:v.member_id,name:v.family_members?.name,emoji:v.family_members?.emoji});});
}
async function loadDayLogs(){
  const today=new Date().toISOString().split('T')[0];
  const{data}=await sb.from('day_logs').select('*').eq('family_id',family.id).eq('log_date',today);
  dayLogs={};(data||[]).forEach(l=>{if(!dayLogs[l.member_id])dayLogs[l.member_id]={};if(!dayLogs[l.member_id][l.meal_type])dayLogs[l.member_id][l.meal_type]=[];dayLogs[l.member_id][l.meal_type].push(l);});
}
function loadGroceries(){try{groceries=JSON.parse(localStorage.getItem('gf-groceries-'+(family?.id||''))||'[]');}catch(e){groceries=[];}}
function saveGroceries(){localStorage.setItem('gf-groceries-'+(family?.id||''),JSON.stringify(groceries));}

function setupRealtime(){
  if(realtimeCh) sb.removeChannel(realtimeCh);
  realtimeCh=sb.channel('gf-'+family.id)
    .on('postgres_changes',{event:'*',schema:'public',table:'votes',filter:'family_id=eq.'+family.id},()=>loadVotes().then(()=>{if(activeTab==='menu')renderMenu();}))
    .on('postgres_changes',{event:'*',schema:'public',table:'day_logs',filter:'family_id=eq.'+family.id},()=>loadDayLogs().then(()=>{if(activeTab==='dag')renderDag();}))
    .on('postgres_changes',{event:'*',schema:'public',table:'recipes',filter:'family_id=eq.'+family.id},()=>loadRecipes().then(()=>{if(activeTab==='menu')renderMenu();else if(activeTab==='menulist')renderMenuList();}))
    .subscribe();
}


// SWITCH TAB
function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll('.tab-content').forEach(el=>el.style.display='none');
  document.querySelectorAll('.nav-btn').forEach(el=>el.classList.remove('active'));
  const te=document.getElementById('tab-'+tab);if(te){te.style.display='flex';te.style.flexDirection='column';}
  const ne=document.getElementById('nav-'+tab);if(ne)ne.classList.add('active');
  if(tab==='menu')renderMenu();
  else if(tab==='menulist')renderMenuList();
  else if(tab==='dag')renderDag();
  else if(tab==='groceries')renderGroceries();
  else if(tab==='add')renderAddForm();
  else if(tab==='settings')renderSettings();
}

function renderDayTabs(){document.getElementById('day-tabs-inner').innerHTML=DAYS.map((d,i)=>`<button class="dtab${i===activeDay?' active':''}" onclick="setDay(${i})">${d}</button>`).join('');}
function setDay(i){activeDay=i;openRecipe=null;renderMenu();document.getElementById('menu-scroll').scrollTop=0;}
function scaleAmt(str,p){const f=p/5;if(f===1)return str;return str.replace(/(\d+([.,]\d+)?)/g,m=>{const n=parseFloat(m.replace(',','.'));if(isNaN(n))return m;const s=n*f;const r=Number.isInteger(s)?s:Math.round(s*10)/10;return String(r).replace('.',',');});}
function getPortion(id){return portions[id]||(members.length||5);}
function isUitEten(day,type){return localStorage.getItem('ue-'+day+'-'+type+'-'+new Date().toISOString().split('T')[0])==='1';}
function toggleUitEten(day,type){const k='ue-'+day+'-'+type+'-'+new Date().toISOString().split('T')[0];localStorage.getItem(k)==='1'?localStorage.removeItem(k):localStorage.setItem(k,'1');renderMenu();}

// VOTES
async function toggleVote(recipeId){
  const today=new Date().toISOString().split('T')[0];
  const myVote=(votes[recipeId]||[]).find(v=>v.member_id===member.id);
  if(myVote){
    // Stem verwijderen
    await sb.from('votes').delete().eq('recipe_id',recipeId).eq('member_id',member.id).eq('vote_date',today);
  } else {
    // Tel alleen EIGEN actieve stemmen
    const myTotalVotes = Object.values(votes).flat().filter(v=>v.member_id===member.id).length;
    if(myTotalVotes >= 2){
      alert('Je hebt al 2 stemmen. Tik op een ✅ om een stem te verwijderen.');
      return;
    }
    const voteDate=new Date().toISOString().split('T')[0]; await sb.from('votes').insert({family_id:family.id,recipe_id:recipeId,member_id:member.id,vote_date:voteDate});
  }
  await loadVotes();
  const modal=document.getElementById('vote-modal');
  if(modal)showVoteModal(parseInt(modal.dataset.day||activeDay));
  else if(activeTab==='menu')renderMenu();
}

function showVoteModal(day){
  const dr=recipes.filter(r=>(r.days||[]).includes(day)).slice(0,3);
  const ex=document.getElementById('vote-modal');if(ex)ex.remove();
  const ov=document.createElement('div');ov.id='vote-modal';ov.dataset.day=day;
  ov.style.cssText='position:fixed;inset:0;background:rgba(26,58,38,0.6);z-index:1000;display:flex;align-items:flex-end;justify-content:center';
  ov.onclick=e=>{if(e.target===ov){ov.remove();if(activeTab==='menu')renderMenu();}};
  ov.innerHTML=`<div style="background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;padding:0 0 40px">
    <div style="padding:16px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;border-radius:24px 24px 0 0">
      <div><div style="font-size:16px;font-weight:800;color:var(--text)">👍 Wat wil jij vanavond?</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px;font-weight:500">Tik op een gerecht om te stemmen</div></div>
      <button onclick="document.getElementById('vote-modal').remove();if(activeTab==='menu')renderMenu();" style="background:none;border:none;color:var(--muted2);font-size:26px;cursor:pointer;line-height:1">×</button>
    </div>
    <div style="padding:14px">
      ${!dr.length?'<div style="text-align:center;padding:20px;color:var(--muted)">Geen recepten voor deze dag</div>':
        dr.map(r=>{const rv=votes[r.id]||[];const vc=rv.length;const myV=rv.some(v=>v.member_id===member.id);const vnames=rv.map(v=>v.emoji+' '+v.name).join(', ');
          return `<div onclick="toggleVote('${r.id}')" style="background:${myV?'linear-gradient(135deg,#E8F8EE,#D4F0DF)':'var(--surf2)'};border-radius:var(--r);padding:14px;margin-bottom:12px;border:1.5px solid ${vc>0?'var(--green)':'var(--border)'};cursor:pointer">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
              <div style="flex:1"><div style="font-size:14px;font-weight:700;color:var(--text)">${r.name}</div>
              <div style="font-size:11px;color:var(--muted);margin-top:3px;font-weight:500">${r.kcal} kcal · ${r.prot}g · ${r.time_min} min</div>
              ${vnames?`<div style="font-size:11px;color:var(--green2);margin-top:3px;font-weight:600">${vnames}</div>`:''}</div>
              <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
                ${vc>0?`<div style="background:var(--green);color:#fff;font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px">${vc} stem${vc>1?'men':''}</div>`:''}
                <div style="font-size:22px">${myV?'✅':'⬜'}</div>
              </div>
            </div>
          </div>`;}).join('')}
    </div>
  </div>`;
  document.body.appendChild(ov);
}

// RENDER MENU
function renderMenu(){
  renderDayTabs();
  const day=activeDay;
  const dr=recipes.filter(r=>(r.days||[]).includes(day));
  const avgK=members.length?Math.round(members.reduce((s,m)=>s+(m.kcal_target||2000),0)/members.length):2000;
  const sorted=dr.sort((a,b)=>{const va=(votes[a.id]||[]).length,vb=(votes[b.id]||[]).length;if(vb!==va)return vb-va;return Math.abs((a.kcal||500)-avgK)-Math.abs((b.kcal||500)-avgK);}).slice(0,3);
  let top=null,tc=0;sorted.forEach(r=>{const c=(votes[r.id]||[]).length;if(c>tc){tc=c;top=r;}});
  const allVoted=members.every(m=>sorted.some(r=>(votes[r.id]||[]).some(v=>v.member_id===m.id)));
  const notVoted=members.filter(m=>!sorted.some(r=>(votes[r.id]||[]).some(v=>v.member_id===m.id)));
  const gvP=members.filter(m=>(m.allergies||[]).includes('Gluten (coeliakie)')).map(m=>m.name);
  let banner='🌾 Alle recepten glutenvrij';
  if(gvP.length)banner+=` — veilig voor ${gvP.join(' & ')}`;
  banner+=` · ${members.length} personen`;
  const luit=isUitEten(day,'lunch'),auit=isUitEten(day,'avond');
  let html=`<div style="font-size:22px;font-weight:800;margin-bottom:8px;color:var(--text)">${DAY_NAMES[day]}</div>
    <div class="uieten-row">
      <button class="uieten-btn${luit?' active':''}" onclick="toggleUitEten(${day},'lunch')">🍴 Lunch buiten${luit?' ✓':''}</button>
      <button class="uieten-btn${auit?' active':''}" onclick="toggleUitEten(${day},'avond')">🍽️ Diner buiten${auit?' ✓':''}</button>
    </div>
    <div class="gv-banner">${banner}</div>`;
  if(top&&tc>0){
    const vn=(votes[top.id]||[]).map(v=>v.emoji+' '+v.name).join(', ');
    html+=`<div class="winner-banner"><div style="display:flex;align-items:center;gap:8px;margin-bottom:3px"><span style="font-size:20px">🏆</span><div><div style="font-size:10px;font-weight:700;color:var(--green2);text-transform:uppercase;letter-spacing:.05em">Meest gestemd — ${tc} stem${tc>1?'men':''}</div><div style="font-size:14px;font-weight:800;color:var(--text)">${top.name}</div></div></div><div style="font-size:11px;color:var(--muted);font-weight:500">${vn}</div></div>`;
  }
  if(!allVoted){
    const lbl=notVoted.length<members.length?`👍 Nog niet gestemd: ${notVoted.map(m=>m.emoji+' '+m.name).join(', ')}`:'👍 Stem — wat wil jij vanavond?';
    html+=`<button class="vote-btn" onclick="showVoteModal(${day})">${lbl}</button>`;
  }
  html+=`<div style="font-size:13px;font-weight:700;margin-bottom:10px;color:var(--text)">🍽️ Avondmaaltijd</div>`;
  if(!sorted.length)html+=`<div class="empty-state"><div class="icon">🍽️</div><p>Geen recepten voor deze dag.<br>Voeg recepten toe via het Menu's tabblad.</p></div>`;
  else sorted.forEach(r=>{html+=renderRecipeCard(r);});
  const ms=document.getElementById('menu-scroll');if(ms)ms.innerHTML=html;
}

function renderRecipeCard(r){

  const vc=(votes[r.id]||[]).length;const myV=(votes[r.id]||[]).some(v=>v.member_id===member?.id);
  const ings=Array.isArray(r.ingredients)?r.ingredients:[];
  let body='';
  if(isOpen){
    body=`<div class="card-body">
      <div class="sec-lbl">Porties aanpassen</div>
      <div class="portions-row"><span class="portions-lbl">Aantal personen</span>
        <button class="port-btn" onclick="portions['${r.id}']=Math.max(1,getPortion('${r.id}')-1);if(activeTab==='menu')renderMenu();">−</button>
        <span class="portions-val">${p}</span>
        <button class="port-btn" onclick="portions['${r.id}']=Math.min(12,getPortion('${r.id}')+1);if(activeTab==='menu')renderMenu();">+</button>

        <div class="mbar-item"><div class="mbar-val">${sk}</div><div class="mbar-lbl">kcal totaal</div></div>

        <div class="mbar-item"><div class="mbar-val">${sp}g</div><div class="mbar-lbl">eiwit totaal</div></div>
        <div class="mbar-item"><div class="mbar-val">${Math.round(sp/p)}g</div><div class="mbar-lbl">eiwit p.p.</div></div>
      </div>
      <div class="sec-lbl">Ingrediënten — ${p} personen</div>
      <div class="ing-list">${ings.map(ing=>`<div class="ing-row"><span class="ing-name">${ing[0]}</span><span class="ing-amount">${scaleAmt(ing[1]||'',p)}</span></div>`).join('')}</div>
      <button onclick="addAllGroceries('${r.id}')" style="width:100%;margin-top:10px;padding:9px;border-radius:var(--rsm);background:linear-gradient(135deg,#E8F8EE,#D4F0DF);border:1.5px solid var(--green);color:var(--green2);font-size:13px;font-weight:700;cursor:pointer">+ Alle ingrediënten naar boodschappenlijst</button>
      <div class="sec-lbl">Bereiding</div>
      <div class="steps">${(r.steps||[]).map((s,i)=>`<div class="step"><div class="snum">${i+1}</div><span>${s}</span></div>`).join('')}</div>
      ${r.tip?`<div class="tip-box">💡 ${r.tip}</div>`:''}
      <button onclick="addRecipeToDag('${r.id}')" style="width:100%;margin-top:10px;padding:9px;border-radius:var(--rsm);background:linear-gradient(135deg,#EDE7F6,#E8EAF6);border:1.5px solid var(--boks);color:var(--boks);font-size:12px;font-weight:700;cursor:pointer">+ Voeg toe aan mijn avondeten</button>
    </div>`;
  }
  return `<div class="card${isOpen?' open':''}" id="rc-${r.id}">
    <div class="card-head" onclick="openRecipe=openRecipe==='${r.id}'?null:'${r.id}';if(activeTab==='menu')renderMenu();else renderMenuList();">
      <div style="flex:1"><div class="card-title">${r.name}</div>
        <div class="chips"><span class="chip ck">${sk} kcal</span><span class="chip cp">${sp}g eiwit</span><span class="chip ct">${r.time_min} min</span>
          ${r.low_carb?'<span class="chip clc">Low-carb</span>':''}${r.gv?'<span class="chip cgv">GV</span>':''}
          ${vc>0?`<span class="chip cvote">👍 ${vc}${myV?' (jij)':''}</span>`:''}
        </div>

}

// MENU LIST

      } else {

          const vc=(votes[r.id]||[]).length;

          html+=`<div class="card${openRecipe===r.id?' open':''}" style="margin-bottom:7px" id="rc-ml-${r.id}">
            <div class="card-head" onclick="openRecipe=openRecipe==='${r.id}'?null:'${r.id}';renderMenuList()">
              <div style="flex:1"><div class="card-title">${r.name}</div>

              <div style="display:flex;gap:5px;align-items:center">
                <button onclick="event.stopPropagation();showDayModal('${r.id}')" style="padding:5px 10px;border-radius:20px;background:var(--surf2);border:1.5px solid var(--border2);color:var(--muted);font-size:10px;font-weight:600;cursor:pointer">📅 Dag</button>
                <span class="chevron">›</span>

              <div class="portions-row"><span class="portions-lbl">Aantal personen</span>
                <button class="port-btn" onclick="portions['${r.id}']=Math.max(1,getPortion('${r.id}')-1);renderMenuList()">−</button>

        <button onclick="addAllGroceries('${r.id}')" style="width:100%;margin-top:10px;padding:9px;border-radius:var(--rsm);background:linear-gradient(135deg,#E8F8EE,#D4F0DF);border:1.5px solid var(--green);color:var(--green2);font-size:13px;font-weight:700;cursor:pointer">🛒 Naar boodschappenlijst</button>
        <div class="sec-lbl">Bereiding</div>

function getAdvice(r){
  if(r.low_carb)return{label:'⚡ Ideaal op rustdag',color:'#F57F17',bg:'#FFF8E1'};
  if((r.kcal||0)>550)return{label:'💪 Perfect na training',color:'var(--green2)',bg:'#E8F8EE'};
  if((r.kcal||0)>480)return{label:'🥊 Goed op sportdag',color:'var(--boks)',bg:'#EDE7F6'};
  if((r.time_min||0)>40)return{label:'🎉 Weekend gerecht',color:'var(--danger)',bg:'#FFEBEE'};
  return{label:'⚡ Licht & snel',color:'var(--green2)',bg:'#E8F8EE'};
}

function renderRecipeList(list){
  if(!list.length)return`<div class="empty-state"><div class="icon">🍽️</div><p>Geen recepten gevonden.</p></div>`;
  return list.map(r=>{const vc=(votes[r.id]||[]).length;const adv=getAdvice(r);const days=(r.days||[]);
    return`<div class="card" style="margin-bottom:8px"><div style="padding:12px 14px">
      <div style="display:flex;align-items:flex-start;gap:8px">
        <div style="flex:1">
          <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px">${r.name}</div>
          <div style="font-size:11px;color:var(--muted);font-weight:500;margin-bottom:5px">${r.kcal} kcal · ${r.prot}g · ${r.time_min} min${r.low_carb?' · Low-carb':''}${r.gv?' · GV':''}</div>
          <div style="display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;background:${adv.bg};font-size:10px;font-weight:700;color:${adv.color};margin-bottom:5px">${adv.label}</div>
          <div style="display:flex;flex-wrap:wrap;gap:4px">${days.map(d=>`<span style="font-size:10px;padding:2px 7px;border-radius:10px;background:var(--surf2);color:var(--muted);font-weight:600">${DAY_NAMES[d]}</span>`).join('')}</div>
          ${vc>0?`<div style="font-size:10px;color:var(--green2);font-weight:700;margin-top:4px">👍 ${vc} stem${vc>1?'men':''}</div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;gap:5px;flex-shrink:0">
          <button onclick="showDayModal('${r.id}')" style="padding:5px 10px;border-radius:20px;background:var(--surf2);border:1.5px solid var(--border2);color:var(--muted);font-size:10px;font-weight:600;cursor:pointer">📅 Dag</button>
          ${!r.is_default?`<button onclick="deleteRecipe('${r.id}')" style="padding:5px 10px;border-radius:20px;background:none;border:1.5px solid var(--danger);color:var(--danger);font-size:10px;font-weight:600;cursor:pointer">Verwijder</button>`:''}

function filterR(val){const f=recipes.filter(r=>r.name.toLowerCase().includes(val.toLowerCase()));const el=document.getElementById('recipe-list');if(el)el.innerHTML=renderRecipeList(f);}

function showDayModal(rid){
  const r=recipes.find(rec=>rec.id===rid);if(!r)return;
  const ex=document.getElementById('day-modal');if(ex)ex.remove();
  window._sd=[...(r.days||[])];
  const adv=getAdvice(r);
  const ov=document.createElement('div');ov.id='day-modal';
  ov.style.cssText='position:fixed;inset:0;background:rgba(26,58,38,0.6);z-index:1000;display:flex;align-items:flex-end;justify-content:center';
  ov.onclick=e=>{if(e.target===ov)ov.remove();};
  ov.innerHTML=`<div style="background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:600px;padding:0 0 30px">
    <div style="padding:16px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;border-radius:24px 24px 0 0">
      <div><div style="font-size:15px;font-weight:800;color:var(--text)">📅 Dag instellen</div>
      <div style="font-size:12px;color:var(--muted);margin-top:2px">${r.name}</div></div>
      <button onclick="document.getElementById('day-modal').remove()" style="background:none;border:none;color:var(--muted2);font-size:26px;cursor:pointer;line-height:1">×</button>
    </div>
    <div style="padding:14px">
      <div style="background:${adv.bg};border-radius:var(--rsm);padding:10px 12px;margin-bottom:14px">
        <div style="font-size:11px;font-weight:700;color:${adv.color};margin-bottom:2px">🤖 App aanbeveling</div>
        <div style="font-size:12px;color:var(--text);font-weight:500">${adv.label}</div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">
        ${DAYS.map((d,i)=>`<button onclick="toggleDP(${i})" id="dp-${i}" style="padding:8px 14px;border-radius:20px;font-size:12px;font-weight:700;border:1.5px solid ${window._sd.includes(i)?'var(--green)':'var(--border2)'};background:${window._sd.includes(i)?'var(--green)':'#fff'};color:${window._sd.includes(i)?'#fff':'var(--muted)'};cursor:pointer">${d}</button>`).join('')}
      </div>
      <button onclick="saveDayChange('${rid}')" style="width:100%;padding:13px;border-radius:var(--rsm);background:linear-gradient(135deg,#2ECC71,#27AE60);border:none;color:#fff;font-size:14px;font-weight:800;cursor:pointer">✓ Opslaan</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
}

function toggleDP(i){const arr=window._sd||[];const idx=arr.indexOf(i);if(idx>-1)arr.splice(idx,1);else arr.push(i);window._sd=arr;
  DAYS.forEach((_,j)=>{const b=document.getElementById('dp-'+j);if(!b)return;b.style.borderColor=arr.includes(j)?'var(--green)':'var(--border2)';b.style.background=arr.includes(j)?'var(--green)':'#fff';b.style.color=arr.includes(j)?'#fff':'var(--muted)';});}

async function saveDayChange(rid){
  const days=window._sd||[];if(!days.length){alert('Selecteer minimaal één dag.');return;}
  await sb.from('recipes').update({days}).eq('id',rid);
  document.getElementById('day-modal')?.remove();await loadRecipes();renderMenuList();
}


// GROCERIES
function addAllGroceries(rid){
  const r=recipes.find(rec=>rec.id===rid);if(!r)return;const p=getPortion(rid);
  const ings=Array.isArray(r.ingredients)?r.ingredients:[];
  ings.forEach((ing,i)=>{const s=scaleAmt(ing[1]||'',p);if(!groceries.find(g=>g.rid===rid&&g.i===i))groceries.push({rid,i,name:ing[0],amount:s,done:false,id:Date.now()+'-'+i});});
  saveGroceries();alert('Toegevoegd aan boodschappenlijst!');switchTab('groceries');
}
function renderGroceries(){
  loadGroceries();const items=groceries;
  let html=`<div class="section-head"><h2>🛒 Boodschappen</h2>${items.length?`<button class="clear-btn" onclick="groceries=groceries.filter(g=>!g.done);saveGroceries();renderGroceries()">Verwijder afgevinkt</button>`:''}</div>`;
  if(!items.length){html+=`<div class="empty-state"><div class="icon">🛒</div><p>Nog geen boodschappen.</p></div>`;}
  else{
    const grp={};items.forEach(g=>{const r=recipes.find(rec=>rec.id===g.rid);const l=r?r.name:'Overig';if(!grp[l])grp[l]=[];grp[l].push(g);});
    Object.entries(grp).forEach(([l,gi])=>{html+=`<div class="grocery-section"><div class="grocery-head"><span>${l}</span><button class="clear-btn" onclick="groceries=groceries.filter(g=>g.rid!=='${gi[0].rid}');saveGroceries();renderGroceries()">Verwijder</button></div>
      ${gi.map(g=>`<div class="grocery-item${g.done?' done':''}" onclick="const x=groceries.find(gg=>gg.id==='${g.id}');if(x){x.done=!x.done;saveGroceries();renderGroceries();}"><div style="width:20px;height:20px;border-radius:6px;border:2px solid var(--border2);background:${g.done?'var(--green)':'#fff'};display:flex;align-items:center;justify-content:center;flex-shrink:0">${g.done?'<span style="color:#fff;font-size:11px;font-weight:800">✓</span>':''}</div><span class="grocery-name">${g.name}</span><span class="grocery-amount">${g.amount}</span></div>`).join('')}
    </div>`;});
  }
  document.getElementById('groceries-scroll').innerHTML=html;
}

// DAG TRACKER
function calcTotal(mid){const logs=dayLogs[mid]||{};let k=0,p=0;Object.values(logs).forEach(items=>items.forEach(i=>{k+=i.kcal||0;p+=i.prot||0;}));return{kcal:k,prot:p};}
function isTracking(mid){return localStorage.getItem('tracking-'+mid)!=='false';}
function toggleTracking(mid){localStorage.setItem('tracking-'+mid,isTracking(mid)?'false':'true');renderDag();}

async function addLogItem(mid,mealType,name,kcal,prot){
  await sb.from('day_logs').insert({family_id:family.id,member_id:mid,meal_type:mealType,food_name:name,kcal:parseInt(kcal)||0,prot:parseFloat(prot)||0});
  await loadDayLogs();openQuickForm={};renderDag();
}
async function removeLogItem(id){await sb.from('day_logs').delete().eq('id',id);await loadDayLogs();renderDag();}
async function addRecipeToDag(rid){
  const r=recipes.find(rec=>rec.id===rid);if(!r)return;const p=getPortion(rid);
  await addLogItem(member.id,'avond',r.name,Math.round((r.kcal||0)*p/5),Math.round((r.prot||0)*p/5));
  alert('Toegevoegd aan jouw avondeten!');
}

function renderDag(){
  const today=new Date();const ds=today.toLocaleDateString('nl-NL',{weekday:'long',day:'numeric',month:'long'});
  const fk=members.reduce((s,m)=>s+calcTotal(m.id).kcal,0);const fg=members.reduce((s,m)=>s+(m.kcal_target||2000),0);
  let html=`<div class="dag-top"><div class="dag-top-row">
    <div class="dag-top-title">📅 ${ds.charAt(0).toUpperCase()+ds.slice(1)}</div>
    <button onclick="openScanner({type:'dag',mealType:'snack1'})" style="background:linear-gradient(135deg,#2ECC71,#27AE60);border:none;border-radius:20px;padding:5px 11px;color:#fff;font-size:11px;font-weight:700;cursor:pointer">📷 Scan</button>
  </div><div class="dag-totals">
    <div class="dag-total"><div class="v">${fk}</div><div class="l">Gegeten gezin</div></div>
    <div class="dag-total"><div class="v">${Math.max(0,fg-fk)}</div><div class="l">Nog over</div></div>
  </div></div>`;

  members.forEach(m=>{
    const tracking=isTracking(m.id);const tot=calcTotal(m.id);
    const kg=m.kcal_target||2000;const pg=m.prot_target||100;
    const kl=kg-tot.kcal;const pct=Math.min(100,Math.round(tot.kcal/kg*100));
    const over=tot.kcal>kg;const warn=pct>85&&!over;const isOpen=openTracker===m.id;const mine=m.id===member?.id;
    html+=`<div class="person-dag-card${isOpen?' open':''}">
      <div class="person-dag-head" onclick="openTracker=openTracker==='${m.id}'?null:'${m.id}';renderDag()">
        <div class="person-dag-emoji">${m.emoji}</div>
        <div class="person-dag-info"><div class="person-dag-name">${m.name}${mine?' <span style="font-size:9px;background:var(--green);color:#fff;padding:1px 6px;border-radius:10px;font-weight:700">Jij</span>':''}</div>
        <div class="person-dag-sub">${tracking?`${kg} kcal · ${pg}g eiwit doel`:'Tracking uit'}</div></div>
        <div class="person-dag-right"><div class="person-dag-kcal ${over?'over':warn?'warn':'ok'}">${tot.kcal} kcal</div>
        <div style="font-size:10px;color:var(--muted);font-weight:500">${over?'⚠️ '+Math.abs(kl)+' te veel':kl+' over'}</div>
        <div style="font-size:10px;color:var(--muted);font-weight:500">${tot.prot}g / ${pg}g eiwit</div></div>
      </div>
      <div class="prog-wrap"><div class="prog-bar"><div class="prog-fill${over?' over':warn?' warn':''}" style="width:${pct}%"></div></div></div>`;
    if(isOpen){
      html+=`<div class="person-dag-body">${mine?`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><span style="font-size:12px;color:var(--muted);font-weight:500">Tracking bijhouden</span><button class="toggle-sw${tracking?' on':''}" onclick="toggleTracking('${m.id}')"></button></div>`:''}`;
      if(tracking){
        const ml=dayLogs[m.id]||{};
        MEAL_MOMENTS.forEach(mo=>{
          const items=ml[mo.key]||[];const mk=items.reduce((s,i)=>s+(i.kcal||0),0);const mp=items.reduce((s,i)=>s+(i.prot||0),0);
          const qk=m.id+'-'+mo.key;const qo=openQuickForm[qk];
          html+=`<div class="moment-block"><div class="moment-head-row"><span class="moment-label">${mo.label}</span>${mk>0?`<span class="moment-kcal">${mk} kcal · ${mp}g</span>`:''}</div>
            ${items.length?`<div class="moment-items">${items.map(it=>`<div class="moment-item"><span class="moment-item-name">${it.food_name}</span><span class="moment-item-macros">${it.kcal} kcal · ${it.prot}g</span>${mine?`<button class="moment-item-del" onclick="removeLogItem('${it.id}')">×</button>`:''}</div>`).join('')}</div>`:''}
            ${mine?`<div class="moment-add-row">
              <button class="m-add-btn g" onclick="openScanner({type:'dag',personId:'${m.id}',mealType:'${mo.key}'})">📷 Scan</button>

function handleFotoImport(input){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    // Resize image to max 1200px and compress to stay under 5MB
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const maxSize = 800;
      let w = img.width, h = img.height;
      if(w > h){ h = Math.round(h*maxSize/w); w = maxSize; }
      else { w = Math.round(w*maxSize/h); h = maxSize; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const compressed = canvas.toDataURL('image/jpeg', 0.5);
      _fotoBase64 = compressed.split(',')[1];
      const preview = document.getElementById('foto-preview');
      const previewImg = document.getElementById('foto-img');
      if(preview) preview.style.display = 'block';
      if(previewImg) previewImg.src = compressed;
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

  const gvPersons = members.filter(m=>(m.allergies||[]).includes('Gluten (coeliakie)')).map(m=>m.name);
  
  const aanpassingen = [];
  if(allergyList.includes('Gluten (coeliakie)') || gvPersons.length > 0){
    aanpassingen.push('VERPLICHT glutenvrij maken: vervang alle gluten ingrediënten (pasta→GV pasta Schär, bloem→rijstmeel of maizena, paneermeel→GV paneermeel, sojasaus→tamari, bouillon→GV bouillon)');
  }
  if(allergyList.includes('Lactose')) aanpassingen.push('lactosevrij maken: vervang melk→havermelk, boter→olijfolie, kaas→lactosevrije kaas');
  if(allergyList.includes('Noten')) aanpassingen.push('alle noten weglaten of vervangen');

Days: 0=ma 1=di 2=wo 3=do 4=vr 5=za 6=zo.`;

  let messages = [];

const SPORT_EMOJI_MAP2 = {'Fitness/Kracht':'💪','Boksen':'🥊','Padel':'🎾','Voetbal':'⚽','Handbal':'🤾','Basketbal':'🏀','Tennis':'🎾','Zwemmen':'🏊','Hardlopen':'🏃','Wandelen':'🚶','Fietsen':'🚴','Yoga':'🧘','Dans':'💃','Geen sport':'😴'};
const ALLERGIES_LIST = ['Gluten (coeliakie)','Lactose','Noten','Ei','Soja','Vis','Schaaldieren','Geen'];
const PREFS_LIST = ['Geen vis','Geen vlees','Vegetarisch','Geen pittig','Geen ui','Geen champignons','Geen knoflook','Geen kaas','Geen eieren'];
const LIKES_LIST = ['Pasta','Rijst','Vis','Kip','Rood vlees','Soep','Salade','Aziatisch','Italiaans','Mexicaans','Pittig','BBQ','Ovenschotels','Stamppot','Pizza','Wraps'];
const ACTIVITY_LABELS = ['Weinig actief','Licht actief (1-2x/week)','Matig actief (3-4x/week)','Zeer actief (5+/week)','Topsporter'];
const ACT_FACTOR = [1.2,1.375,1.55,1.725,1.9];

function calcKcal(m){
  if(!m.weight||!m.height||!m.dob) return 2000;
  const age = getAge(m.dob);
  const bmr = m.gender==='v' ? Math.round(10*m.weight+6.25*m.height-5*age-161) : Math.round(10*m.weight+6.25*m.height-5*age+5);
  const tdee = Math.round(bmr*(ACT_FACTOR[m.activity||2]||1.55));
  if(m.goal==='afvallen') return Math.max(1200,tdee-300);
  if(m.goal==='spieren') return tdee+200;
  return tdee;
}
function calcProt(m){
  const age = getAge(m.dob||'2000-01-01');
  if(age<12) return Math.round((m.weight||35)*1.2);
  if(age<18) return Math.round((m.weight||50)*1.5);
  return (m.sports||[]).length>0 ? Math.round((m.weight||70)*2.0) : Math.round((m.weight||70)*1.6);
}
function getAge(dob){if(!dob)return 30;const b=new Date(dob),t=new Date();let a=t.getFullYear()-b.getFullYear();if(t.getMonth()<b.getMonth()||(t.getMonth()===b.getMonth()&&t.getDate()<b.getDate()))a--;return a;}

let _memberEdits = {};

function pickEmoji(memberId){
  const emojis = ['👤','💪','👩','🌸','⭐','🧒','👦','👧','🧑','🏃','🏋️','🤸','⚽','🎾','🏊','🚴','🧘','🥊'];
  const existing = document.getElementById('emoji-picker-'+memberId);
  if(existing){existing.remove();return;}
  const el = document.createElement('div');
  el.id = 'emoji-picker-'+memberId;
  el.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:16px;padding:16px;box-shadow:0 8px 40px rgba(0,0,0,0.3);z-index:3000;display:flex;flex-wrap:wrap;gap:8px;max-width:280px;justify-content:center';
  el.innerHTML = emojis.map(e=>`<div onclick="setMemberEmoji('${memberId}','${e}');document.getElementById('emoji-picker-${memberId}').remove()" style="font-size:32px;cursor:pointer;padding:4px;border-radius:8px;hover:background:#f0f0f0">${e}</div>`).join('');
  document.body.appendChild(el);
}

async function setMemberEmoji(memberId, emoji){
  await sb.from('family_members').update({emoji}).eq('id',memberId);
  const idx = members.findIndex(m=>m.id===memberId);
  if(idx>-1) members[idx].emoji = emoji;
  renderSettings();
}

function toggleTag(memberId, field, val){
  if(!_memberEdits[memberId]) _memberEdits[memberId] = {};
  const m = members.find(mem=>mem.id===memberId);
  if(!m) return;
  const current = _memberEdits[memberId][field] !== undefined ? _memberEdits[memberId][field] : [...(m[field]||[])];
  const idx = current.indexOf(val);
  if(idx>-1) current.splice(idx,1); else current.push(val);
  _memberEdits[memberId][field] = current;
  // Update button style
  const safeVal = val.replace(/\//g,'-').replace(/ /g,'-');
  const btn = document.getElementById('tag-'+field+'-'+memberId+'-'+safeVal);
  if(btn){
    const active = current.includes(val);
    const colors = {sports:['var(--green)','#fff'],allergies:['var(--danger)','#fff'],prefs:['var(--boks)','#fff']};
    const [ac,ic] = colors[field]||['var(--green)','#fff'];
    btn.style.borderColor = active?ac:'var(--border2)';

async function saveProfile(memberId){
  const m = members.find(mem=>mem.id===memberId); if(!m) return;
  const edits = _memberEdits[memberId] || {};
  const weight = parseFloat(document.getElementById('prof-weight')?.value)||m.weight||70;
  const height = parseFloat(document.getElementById('prof-height')?.value)||m.height||170;
  const activity = parseInt(document.getElementById('prof-activity')?.value)||m.activity||2;
  const goal = document.getElementById('prof-goal')?.value||m.goal||'gezond';
  const gender = window._editGender || m.gender || 'm';
  const sports = edits.sports !== undefined ? edits.sports : (m.sports||[]);
  const allergies = edits.allergies !== undefined ? edits.allergies : (m.allergies||[]);
  const prefs = edits.prefs !== undefined ? edits.prefs : (m.prefs||[]);

  const dobRaw = document.getElementById('prof-dob')?.value || m.dob || '';
  const dob = dobRaw && dobRaw.trim() !== '' ? dobRaw : null;

  // Calculate targets
  const tempM = {...m, weight, height, activity, goal, gender, dob};
  const kcalTarget = calcKcal(tempM);
  const protTarget = calcProt({...tempM, sports});

  const likes = edits.likes !== undefined ? edits.likes : (m.likes||[]);
  const updateData = {weight,height,activity,goal,gender,dob,sports,allergies,prefs,likes,kcal_target:kcalTarget,prot_target:protTarget};
  if(dob !== null) updateData.dob = dob;
  const{error} = await sb.from('family_members').update(updateData).eq('id',memberId);
  if(error){alert('Fout: '+error.message);return;}

  // Update local
  const idx = members.findIndex(mem=>mem.id===memberId);
  if(idx>-1) members[idx] = {...m,weight,height,activity,goal,gender,dob,sports,allergies,prefs,likes,kcal_target:kcalTarget,prot_target:protTarget};
  if(memberId===member?.id) member = members[idx];
  delete _memberEdits[memberId];

    window._closeModal();
  alert(`✅ Profiel opgeslagen!\n${kcalTarget} kcal · ${protTarget}g eiwit per dag`);
  renderSettings();
}

async function refreshRecipes(){

  if(!apiKey){ alert('Vul eerst je API key in.'); return; }
  
  const currentRecipes = [...recipes];
  if(currentRecipes.length === 0){ return generateRecipes(); }
  
  // Keep half, replace half
  const keepCount = Math.ceil(currentRecipes.length / 2);
  const toKeep = currentRecipes.slice(0, keepCount);
  const toReplace = currentRecipes.slice(keepCount);
  
  // Try to get replacements from global db first
  const globalRecs = await loadGlobalRecipes(50);
  const currentNames = currentRecipes.map(r=>r.name);
  const forbidden2 = [...(family.allergyList||[])];
  
  const candidates = globalRecs.filter(r => 
    r.gv && 
    !currentNames.includes(r.name) &&
    !forbidden.some(f=>JSON.stringify(r.ingredients||[]).toLowerCase().includes(f.toLowerCase()))
  );
  
  if(candidates.length >= toReplace.length){
    // Replace from global db
    const replacements = candidates.slice(0,toReplace.length).map(r=>({
      ...r, family_id:family.id, is_default:true, created_by:user.id, id:undefined
    }));
    
    // Delete old ones
    for(const r of toReplace){
      await sb.from('recipes').delete().eq('id',r.id);
    }
    // Insert new ones
    await sb.from('recipes').insert(replacements);
    await loadRecipes();
    alert('✅ '+replacements.length+' recepten gewisseld uit de database!');
    renderMenuList();
    renderSettings();
  } else {
    // Not enough in global db, generate new ones
    alert('Niet genoeg recepten in de database, nieuwe recepten worden gegenereerd...');
    generateRecipes();
  }
}

async function startCam(){
  if(typeof ZXing==='undefined'){document.getElementById('scan-hint').textContent='Bibliotheek niet geladen.';return;}
  try{codeReader=new ZXing.BrowserMultiFormatReader();
    await codeReader.decodeFromVideoDevice(null,document.getElementById('scan-video'),(res,err)=>{if(res&&!scannedProd&&!_scanLock)handleBarcode(res.getText());});
  }catch(e){const h=document.getElementById('scan-hint');if(h)h.textContent='Camera toegang geweigerd.';}

async function handleBarcode(bc){
  if(scannedProd||_scanLock)return;_scanLock=true;
  const h=document.getElementById('scan-hint');if(h)h.textContent='Zoeken...';
  try{
    const r=await fetch('https://world.openfoodfacts.org/api/v0/product/'+bc+'.json');const d=await r.json();
    if(d.status!==1||!d.product){if(h)h.textContent='Niet gevonden.';setTimeout(()=>{scannedProd=null;_scanLock=false;if(h)h.textContent='Houd de barcode in het groene kader';},2500);return;}
    const p=d.product;const n=p.nutriments||{};
    scannedProd={name:p.product_name_nl||p.product_name||'Onbekend',brand:p.brands||'',kcal:Math.round(n['energy-kcal_100g']||0),prot:Math.round((n.proteins_100g||0)*10)/10,carbs:Math.round((n.carbohydrates_100g||0)*10)/10,fat:Math.round((n.fat_100g||0)*10)/10};
    showScanResult();
  }catch(e){if(h)h.textContent='Verbindingsfout.';setTimeout(()=>{scannedProd=null;_scanLock=false;if(h)h.textContent='Houd de barcode in het groene kader';},2500);}
}

function showScanResult(){
  const p=scannedProd;const el=document.getElementById('scan-result');if(!el)return;
  el.innerHTML=`<div style="font-size:15px;font-weight:800;color:var(--text);margin-bottom:4px">${p.name}${p.brand?' <span style="font-size:11px;color:var(--muted)">— '+p.brand+'</span>':''}</div>
    <div class="scanner-macros"><div class="scanner-macro"><div class="v">${p.kcal}</div><div class="l">kcal/100g</div></div><div class="scanner-macro"><div class="v">${p.prot}g</div><div class="l">eiwit</div></div><div class="scanner-macro"><div class="v">${p.carbs}g</div><div class="l">koolhyd.</div></div><div class="scanner-macro"><div class="v">${p.fat}g</div><div class="l">vet</div></div></div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px"><input type="number" id="sg" value="100" min="1" max="2000" oninput="updateCalc()" style="width:80px;background:var(--surf2);border:1.5px solid var(--border2);border-radius:var(--rsm);padding:7px 10px;color:var(--text);font-size:14px;font-weight:700;text-align:center"><span style="font-size:13px;color:var(--muted);font-weight:500">gram</span><span style="font-size:13px;font-weight:700;color:var(--green2)" id="sc">${p.kcal} kcal · ${p.prot}g eiwit</span></div>
    <div style="margin-bottom:10px"><div style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Maaltijdmoment</div>
    <select id="smt" style="width:100%;background:var(--surf2);border:1.5px solid var(--border2);border-radius:var(--rsm);padding:8px 11px;color:var(--text);font-size:13px">${MEAL_MOMENTS.map(m=>`<option value="${m.key}"${m.key===(scanCtx?.mealType||'snack1')?' selected':''}>${m.label}</option>`).join('')}</select></div>
    <div style="margin-bottom:10px"><div style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Voor wie?</div>
    <div class="scanner-person-btns" id="spb">${members.map(m=>`<button class="scanner-person-btn${scanPersons.includes(m.id)?' sel':''}" onclick="toggleScanPerson('${m.id}')">${m.emoji} ${m.name}</button>`).join('')}</div></div>
    <button class="scanner-add-btn" onclick="addScan()">✓ Toevoegen aan dagtracker</button>
    <button onclick="scannedProd=null;_scanLock=false;document.getElementById('scan-result').classList.remove('show');document.getElementById('scan-result').innerHTML='';" style="width:100%;padding:9px;border-radius:var(--rsm);background:none;border:1.5px solid var(--border2);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;margin-top:7px">↩ Opnieuw</button>`;
  el.classList.add('show');
}

function updateCalc(){if(!scannedProd)return;const g=parseInt(document.getElementById('sg')?.value)||100;const f=g/100;const el=document.getElementById('sc');if(el)el.textContent=Math.round(scannedProd.kcal*f)+' kcal · '+Math.round(scannedProd.prot*f*10)/10+'g eiwit';}
function toggleScanPerson(id){const i=scanPersons.indexOf(id);if(i>-1)scanPersons.splice(i,1);else scanPersons.push(id);const c=document.getElementById('spb');if(c)c.innerHTML=members.map(m=>`<button class="scanner-person-btn${scanPersons.includes(m.id)?' sel':''}" onclick="toggleScanPerson('${m.id}')">${m.emoji} ${m.name}</button>`).join('');}

async function addScan(){
  const ge=document.getElementById('sg');const me=document.getElementById('smt');const g=parseInt(ge?.value)||100;const mt=me?.value||'snack1';
  if(!scannedProd){alert('Geen product gescand.');return;}if(!scanPersons.length){alert('Selecteer minimaal één persoon.');return;}
  const f=g/100;const k=Math.round(scannedProd.kcal*f);const p=Math.round(scannedProd.prot*f*10)/10;const n=scannedProd.name+' ('+g+'g)';
  closeScanner();for(const pid of [...scanPersons])await addLogItem(pid,mt,n,k,p);
  alert(n+' toegevoegd!');if(activeTab==='dag')renderDag();else switchTab('dag');
}

function closeScanner(){if(codeReader){try{codeReader.reset();}catch(e){}codeReader=null;}scannedProd=null;_scanLock=false;document.getElementById('scan-ov')?.remove();}

// Inline PWA manifest
const manifestData = {
  name: 'Gezinfit',
  short_name: 'Gezinfit',
  description: 'Samen eten · Samen bewegen',
  start_url: 'https://app.gezinfit.nl/',
  display: 'standalone',
  background_color: '#27AE60',
  theme_color: '#27AE60',
  orientation: 'portrait',
  icons: [{
    src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2327AE60'/><text y='.9em' font-size='80' x='10'>🥗</text></svg>",
    sizes: '192x192',
    type: 'image/svg+xml'
  }]
};
const manifestBlob = new Blob([JSON.stringify(manifestData)], {type:'application/json'});
const manifestURL = URL.createObjectURL(manifestBlob);
const manifestLink = document.createElement('link');
manifestLink.rel = 'manifest';
manifestLink.href = manifestURL;
document.head.appendChild(manifestLink);

window.addEventListener('load', async()=>{
  const p=new URLSearchParams(window.location.search);
  if(p.get('invite')){
    // Gezinslid uitnodiging
    showAuthTab('register');
  } else if(p.get('newgezin')){
    // Nieuw gezin uitnodiging
    showAuthTab('register');
    // Mark this as a new family registration
    window._newGezinInvite = true;
  } else {
    showAuthTab('login');
  }
  // Check if already logged in
  try{
    const{data:{session}}=await sb.auth.getSession();
    if(session?.user){
      await loadData(session.user);
    }
  }catch(e){console.log('No session');}
});
