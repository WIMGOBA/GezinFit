    const me=(m.prefs||[]).filter(p=>p.startsWith('Geen ')).map(p=>p.replace('Geen ',''));
    const ml=(m.likes||[]);
    const parts=[];
    if(ma.length) parts.push('ALLERGISCH voor: '+ma.join(', '));
    if(me.length) parts.push('LUST NIET: '+me.join(', '));
    if(ml.length) parts.push('LUST GRAAG: '+ml.map(l=>l.replace('Houdt van ','')).join(', '));
    return parts.length ? m.name+' → '+parts.join(' | ') : null;
  }).filter(Boolean);

  const forbidden = [...allergyList, ...exclusions].filter(Boolean);

  // Seizoen
  const maand = new Date().getMonth();
  const seizoen = maand<=1||maand===11?'winter':maand<=4?'lente':maand<=7?'zomer':'herfst';
  const seizoenTip = seizoen==='zomer'?'Lichte zomerse gerechten. GEEN stampot of hutspot.':seizoen==='lente'?'Frisse lente gerechten.':seizoen==='herfst'?'Herfst comfort food.':'Verwarmende wintergerechten.';

  // Budget en tijd
  const weekBudgetAI = getWeekBudget();
  const totaalLeden = Math.max(numPersons, members.length);
  const budgetPP = Math.round(weekBudgetAI/Math.max(totaalLeden,1)/7*100)/100;
  const cookingTime = parseInt(localStorage.getItem('gf-tijd-week-'+(family?.id||'')))||(hasKids?30:45);
  const cookingTimeWknd = parseInt(localStorage.getItem('gf-tijd-weekend-'+(family?.id||'')))||60;
  const winkels = getSupermarkten().map(id=>SUPERMARKTEN.find(m=>m.id===id)?.name).filter(Boolean).join('/');

  // Favorieten bewaren
  const activeFavs = recipes.filter(r=>r.favorite&&!r.archived);
  const slotsNodig = Math.max(7, 21-activeFavs.length);
  const receptenPerBatch = Math.ceil(slotsNodig/3);

  const btn = document.getElementById('gen-recipes-btn');
  if(btn){ btn.disabled=true; btn.textContent='⏳ Recepten worden gegenereerd...'; }

  try{
    const setBar = (pct) => {
      _targetProgress = pct;
      _autoProgress = Math.max(_autoProgress, pct-10);
    };

    const doCall = async(batchNum, namen_te_vermijden='') => {
      setBar([5,35,65][batchNum]);
      const hasKidsUnder12 = members.some(m=>getAge(m.dob||'2010-01-01')<12);
      const maxTijd = batchNum>=5?cookingTimeWknd:cookingTime;

      const zomerFilter = (seizoen==='zomer'||seizoen==='lente') ? 'GEEN stampot, hutspot, erwtensoep, boerenkool of zware stoofpotten.' : '';

      // Dynamisch sportschema uit profielen
      const dagSleutels = ['ma','di','wo','do','vr','za','zo'];
      const sportPerDag = dagSleutels.map((sleutel, i) => {
        const sporters = members.filter(m => {
          const ss = m.sport_schedule || {};
          return Object.values(ss).some(v => v && v.dag === sleutel);
        });
        if(sporters.length === 0) return null;
        const sporten = [...new Set(sporters.flatMap(m =>
          Object.entries(m.sport_schedule||{}).filter(([,v])=>v&&v.dag===sleutel).map(([s])=>s)
        ))];
        const kracht = sporten.some(s=>['Fitness/Kracht','Hardlopen','Zwemmen'].includes(s));
        return `dag ${i} (${sleutel}): ${sporten.join('+')} → ${kracht?'koolhydraatrijk':'eiwitrijk'}`;
      }).filter(Boolean).join(', ');

      const dagPrompt = `Maak PRECIES ${receptenPerBatch} avondrecepten voor ${numPersons} personen.
GEZIN: ${memberDetails.join(' | ')||'geen beperkingen'}
VERBODEN (gebruik NOOIT): ${forbidden.length?forbidden.join(', '):'niets'}
GV verplicht. Max ${maxTijd} min. ~${avgKcal} kcal p.p. Budget €${budgetPP}/p/dag. Winkel: ${winkels||'AH/Jumbo'}.
SEIZOEN ${seizoen}: ${seizoenTip} ${zomerFilter}
SPORTSCHEMA: ${sportPerDag||'geen sport ingesteld — verdeel recepten gelijkmatig over de week'}
Kies per recept de beste dag op basis van het sportschema. Sportdagen: meer koolhydraten. Rustdagen: lichter.
${namen_te_vermijden?'NIET: '+namen_te_vermijden:''}

JSON array, PRECIES ${receptenPerBatch} recepten, elke dag 0-6 maximaal 3x gebruiken:
[{"name":"...","kcal":500,"prot":40,"time_min":30,"low_carb":false,"gv":true,"cost_pp":3.50,"tip":"...","days":[0],"ingredients":[["product","hoeveelheid"]],"steps":["stap1","stap2"]}]
days: 0=ma 1=di 2=wo 3=do 4=vr 5=za 6=zo`;

      const r = await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:5000,messages:[{role:'user',content:dagPrompt}]})
      });
      const d = await r.json();
      if(!r.ok) throw new Error(d.error?.message||'API fout batch '+(batchNum+1));
      const t = d.content.filter(b=>b.type==='text').map(b=>b.text).join('');
      const jm = t.match(/\[[\s\S]*\]/);
      if(!jm) return [];
      try{
        const result = JSON.parse(jm[0]);
        setBar([30,60,90][batchNum]);
        return Array.isArray(result)?result:[];
      } catch(e){
        try{ return JSON.parse(jm[0].replace(/,\s*\{[^{]*$/, ']')); } catch(e2){ return []; }
      }
    };

    const batch1 = await doCall(0);
    const batch2 = await doCall(1, batch1.map(r=>r.name).join(', '));
    const batch3 = await doCall(2, [...batch1,...batch2].map(r=>r.name).join(', '));

    document.getElementById('gen-bar').style.width='95%';

    let allRecipes = [...batch1,...batch2,...batch3].filter(r=>r&&r.name);
    if(allRecipes.length < 5) throw new Error('Te weinig recepten ('+allRecipes.length+'). Probeer opnieuw.');

    // Filter seizoensverboden recepten (hard filter, ongeacht wat AI doet)
    const verboden = (seizoen==='zomer'||seizoen==='lente')
      ? ['stampot','stamppot','hutspot','stoofpot','erwtensoep','boerenkool','snert','zuurkool','hutspot']
      : [];
    allRecipes = allRecipes.filter(r => !verboden.some(v=>r.name.toLowerCase().includes(v)));

    // Max slotsNodig recepten
    allRecipes = allRecipes.slice(0, slotsNodig);

    // Tel welke dagen al bezet zijn door favorieten
    const dagTelling = [0,0,0,0,0,0,0];
    activeFavs.forEach(r => {
      (r.days||[]).forEach(d => { if(d>=0&&d<=6) dagTelling[d]++; });
    });

    // Verdeel nieuwe recepten over dagen — hou rekening met favorieten
    const newRecipes = allRecipes.map((r,i) => {
      // Gebruik AI dag als die nog ruimte heeft (max 3 per dag inclusief favorieten)
      let dag = (Array.isArray(r.days)&&r.days.length>0) ? r.days[0]%7 : i%7;
      if(dagTelling[dag] >= 3){
        // Zoek dag met minste recepten
        dag = dagTelling.indexOf(Math.min(...dagTelling));
      }
      dagTelling[dag]++;
      return {...r, days:[dag]};
    });

    // Archiveer bestaande niet-favorieten
    const currentNonFavs = recipes.filter(r=>!r.favorite&&r.is_default);
    if(currentNonFavs.length>0){
      await sb.from('recipes').update({archived:true}).in('id',currentNonFavs.map(r=>r.id));
    }

    // Insert nieuwe recepten
    const inserts = newRecipes.map(r=>({
      name:r.name,kcal:r.kcal,prot:r.prot,time_min:r.time_min,
      low_carb:r.low_carb||false,gv:r.gv||true,tip:r.tip||'',
      days:r.days,ingredients:r.ingredients||[],steps:r.steps||[],
      cost_pp:r.cost_pp||null,family_id:family.id,is_default:true,
      created_by:user.id,favorite:false,archived:false
    }));
    const{error:insError} = await sb.from('recipes').insert(inserts);
    if(insError) throw new Error('Kon recepten niet opslaan: '+insError.message);

    // Sla ook op in global_recipes
    try {
      for(const r of newRecipes){
        const{data:existing} = await sb.from('global_recipes').select('id').eq('name',r.name).limit(1);
        if(!existing||existing.length===0){
          await sb.from('global_recipes').insert({...r,approved:true,times_used:1,id:undefined,family_id:undefined,is_default:undefined,created_by:undefined,favorite:undefined,archived:undefined});
        } else {
          await sb.from('global_recipes').update({times_used:(existing[0].times_used||0)+1}).eq('id',existing[0].id);
        }
      }
    } catch(e){ console.log('Global db update mislukt (niet kritiek):', e.message); }

    clearInterval(window._progressTimer);
    _targetProgress=100;_autoProgress=100;
    const _b=document.getElementById('gen-bar');const _p=document.getElementById('gen-pct');
    if(_b)_b.style.width='100%';if(_p)_p.textContent='100%';
    await new Promise(r=>setTimeout(r,500));
    document.getElementById('gen-loading')?.remove();
    if(btn){btn.disabled=false;btn.textContent='✨ Nieuwe recepten genereren';}
    await loadRecipes();
    renderMenu();
    renderSettings();
    alert('✅ '+newRecipes.length+' nieuwe recepten gegenereerd!');

  } catch(e){
    clearInterval(window._progressTimer);
    document.getElementById('gen-loading')?.remove();
    if(btn){btn.disabled=false;btn.textContent='✨ Opnieuw proberen';}
    console.error('Genereer fout:',e);
    if(e.message==='Load failed'||e.message==='Failed to fetch'||e.name==='AbortError'){
      alert('Verbindingsfout. Controleer je internetverbinding en API key. Probeer in Chrome als Safari problemen geeft.');
    } else {
      alert('Fout bij genereren: '+e.message);
    }
  }
}

async function genInvite(type='member'){
  if(type==='member'){
    // Gezinslid link — koppelt aan dit gezin
    const{data:existing}=await sb.from('invitations').select('*').eq('family_id',family.id).eq('used',false).limit(1);
    let data;
    if(existing&&existing.length>0){
      data=existing[0];
    } else {
      const{data:newInv,error}=await sb.from('invitations').insert({family_id:family.id,email:'invite@gezinfit.nl'}).select().single();
      if(error){alert('Fout: '+error.message);return;}
      data=newInv;
    }
    const url='https://app.gezinfit.nl?invite='+data.token;
    const el=document.getElementById('invite-member-result');
    el.innerHTML=`<div style="margin-top:10px">
      <div class="invite-link-box">${url}</div>
      <button onclick="navigator.share?navigator.share({title:'Gezinfit uitnodiging',url:'${url}'}):navigator.clipboard.writeText('${url}').then(()=>alert('Link gekopieerd!'))" style="width:100%;padding:10px;border-radius:var(--rsm);background:#fff;border:1.5px solid var(--green);color:var(--green2);font-size:13px;font-weight:700;cursor:pointer">📤 Deel link met gezinslid</button>
    </div>`;
  } else {
    // Nieuw gezin link — starten eigen gezin
    const token = 'new-' + Math.random().toString(36).substr(2,12);
    const url = 'https://app.gezinfit.nl?newgezin='+token;
    const el=document.getElementById('invite-family-result');
    el.innerHTML=`<div style="margin-top:10px">
      <div class="invite-link-box">${url}</div>
      <button onclick="navigator.share?navigator.share({title:'Gezinfit uitnodiging',url:'${url}'}):navigator.clipboard.writeText('${url}').then(()=>alert('Link gekopieerd!'))" style="width:100%;padding:10px;border-radius:var(--rsm);background:#fff;border:1.5px solid var(--boks);color:var(--boks);font-size:13px;font-weight:700;cursor:pointer">📤 Deel link met testgezin</button>
      <div style="font-size:11px;color:var(--muted);margin-top:6px;text-align:center">Ze starten hun eigen gezin — komen niet bij jou in</div>
    </div>`;
  }
}

// SCANNER
function openScanner(ctx){
  scanCtx=ctx;scanPersons=ctx.personId?[ctx.personId]:[member?.id].filter(Boolean);scannedProd=null;_scanLock=false;
  const ov=document.createElement('div');ov.id='scan-ov';ov.className='scanner-overlay';
  ov.innerHTML=`<div class="scanner-header"><div class="scanner-title">📷 Barcode scannen</div><button class="scanner-close" onclick="closeScanner()">×</button></div>
    <div class="scanner-viewport"><video id="scan-video" autoplay playsinline muted></video>
    <div class="scanner-frame"><div class="scanner-box"></div></div>
    <div class="scanner-line"></div><div class="scanner-hint" id="scan-hint">Houd de barcode in het groene kader</div></div>
    <div class="scanner-result" id="scan-result"></div>`;
  document.body.appendChild(ov);startCam();
}

async function startCam(){
  const h = document.getElementById('scan-hint');
  // Check camera support
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    if(h) h.textContent='Camera niet ondersteund op dit apparaat.';
    return;
  }
  if(typeof ZXing==='undefined'){
    if(h) h.textContent='Scanner bibliotheek laadt... probeer opnieuw.';
    return;
  }
  try{
    // Vraag eerst expliciet camera toegang
    await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    codeReader = new ZXing.BrowserMultiFormatReader();
    if(h) h.textContent='Camera gestart, houd barcode in het kader...';
    await codeReader.decodeFromVideoDevice(null, document.getElementById('scan-video'), (res,err)=>{
      if(res&&!scannedProd&&!_scanLock) handleBarcode(res.getText());
    });
  }catch(e){
    if(h){
      if(e.name==='NotAllowedError'||e.name==='PermissionDeniedError'){
        h.textContent='Camera toegang geweigerd. Sta camera toe in je browserinstellingen.';
      } else if(e.name==='NotFoundError'){
        h.textContent='Geen camera gevonden op dit apparaat.';
      } else {
        h.textContent='Camera fout: '+e.message;
      }
    }
  }
}

async function handleBarcode(bc){
  if(scannedProd||_scanLock)return;_scanLock=true;
  const h=document.getElementById('scan-hint');if(h)h.textContent='Zoeken...';
  try{
    const r=await fetch('https://world.openfoodfacts.org/api/v0/product/'+bc+'.json');const d=await r.json();
    if(d.status!==1||!d.product){if(h)h.textContent='Niet gevonden.';setTimeout(()=>{scannedProd=null;_scanLock=false;if(h)h.textContent='Houd de barcode in het groene kader';},2500);return;}
    const p=d.product;const n=p.nutriments||{};
    scannedProd={name:p.product_name_nl||p.product_name||'Onbekend',brand:p.brands||'',kcal:Math.round(n['energy-kcal_100g']||0),prot:Math.round((n.proteins_100g||0)*10)/10,carbs:Math.round((n.carbohydrates_100g||0)*10)/10,fat:Math.round((n.fat_100g||0)*10)/10};
    showScanResult();
  }catch(e){if(h)h.textContent='Verbindingsfout.';setTimeout(()=>{scannedProd=null;_scanLock=false;if(h)h.textContent='Houd de barcode in het groene kader';},2500);}
}

function showScanResult(){
  const p=scannedProd;const el=document.getElementById('scan-result');if(!el)return;
  el.innerHTML=`<div style="font-size:15px;font-weight:800;color:var(--text);margin-bottom:4px">${p.name}${p.brand?' <span style="font-size:11px;color:var(--muted)">— '+p.brand+'</span>':''}</div>
    <div class="scanner-macros"><div class="scanner-macro"><div class="v">${p.kcal}</div><div class="l">kcal/100g</div></div><div class="scanner-macro"><div class="v">${p.prot}g</div><div class="l">eiwit</div></div><div class="scanner-macro"><div class="v">${p.carbs}g</div><div class="l">koolhyd.</div></div><div class="scanner-macro"><div class="v">${p.fat}g</div><div class="l">vet</div></div></div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px"><input type="number" id="sg" value="100" min="1" max="2000" oninput="updateCalc()" style="width:80px;background:var(--surf2);border:1.5px solid var(--border2);border-radius:var(--rsm);padding:7px 10px;color:var(--text);font-size:14px;font-weight:700;text-align:center"><span style="font-size:13px;color:var(--muted);font-weight:500">gram</span><span style="font-size:13px;font-weight:700;color:var(--green2)" id="sc">${p.kcal} kcal · ${p.prot}g eiwit</span></div>
    <div style="margin-bottom:10px"><div style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Maaltijdmoment</div>
    <select id="smt" style="width:100%;background:var(--surf2);border:1.5px solid var(--border2);border-radius:var(--rsm);padding:8px 11px;color:var(--text);font-size:13px">${MEAL_MOMENTS.map(m=>`<option value="${m.key}"${m.key===(scanCtx?.mealType||'snack1')?' selected':''}>${m.label}</option>`).join('')}</select></div>
    <div style="margin-bottom:10px"><div style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Voor wie?</div>
    <div class="scanner-person-btns" id="spb">${members.map(m=>`<button class="scanner-person-btn${scanPersons.includes(m.id)?' sel':''}" onclick="toggleScanPerson('${m.id}')">${m.emoji} ${m.name}</button>`).join('')}</div></div>
    <button class="scanner-add-btn" onclick="addScan()">✓ Toevoegen aan dagtracker</button>
    <button onclick="scannedProd=null;_scanLock=false;document.getElementById('scan-result').classList.remove('show');document.getElementById('scan-result').innerHTML='';" style="width:100%;padding:9px;border-radius:var(--rsm);background:none;border:1.5px solid var(--border2);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;margin-top:7px">↩ Opnieuw</button>`;
  el.classList.add('show');
}

function updateCalc(){if(!scannedProd)return;const g=parseInt(document.getElementById('sg')?.value)||100;const f=g/100;const el=document.getElementById('sc');if(el)el.textContent=Math.round(scannedProd.kcal*f)+' kcal · '+Math.round(scannedProd.prot*f*10)/10+'g eiwit';}
function toggleScanPerson(id){const i=scanPersons.indexOf(id);if(i>-1)scanPersons.splice(i,1);else scanPersons.push(id);const c=document.getElementById('spb');if(c)c.innerHTML=members.map(m=>`<button class="scanner-person-btn${scanPersons.includes(m.id)?' sel':''}" onclick="toggleScanPerson('${m.id}')">${m.emoji} ${m.name}</button>`).join('');}

async function addScan(){
  const ge=document.getElementById('sg');const me=document.getElementById('smt');const g=parseInt(ge?.value)||100;const mt=me?.value||'snack1';
  if(!scannedProd){alert('Geen product gescand.');return;}if(!scanPersons.length){alert('Selecteer minimaal één persoon.');return;}
  const f=g/100;const k=Math.round(scannedProd.kcal*f);const p=Math.round(scannedProd.prot*f*10)/10;const n=scannedProd.name+' ('+g+'g)';
  closeScanner();for(const pid of [...scanPersons])await addLogItem(pid,mt,n,k,p);
  alert(n+' toegevoegd!');if(activeTab==='dag')renderDag();else switchTab('dag');
}

function closeScanner(){if(codeReader){try{codeReader.reset();}catch(e){}codeReader=null;}scannedProd=null;_scanLock=false;document.getElementById('scan-ov')?.remove();}

window.addEventListener('load', async()=>{
  const p=new URLSearchParams(window.location.search);
  if(p.get('invite')){
    // Gezinslid uitnodiging
    showAuthTab('register');
  } else if(p.get('newgezin')){
    // Nieuw gezin uitnodiging
    showAuthTab('register');
    // Mark this as a new family registration
    window._newGezinInvite = true;
  } else {
    showAuthTab('login');
  }
  // Check if already logged in
  try{
    const{data:{session}}=await sb.auth.getSession();
    if(session?.user){
      await loadData(session.user);
