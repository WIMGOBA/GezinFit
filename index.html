<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#2ECC71">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gezinfit">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Gezinfit</title>
<style>
:root{
  --bg:#F0FBF4;--surf:#fff;--surf2:#E8F8EE;--surf3:#D4F0DF;
  --border:rgba(39,174,96,0.15);--border2:rgba(39,174,96,0.3);
  --text:#1A3A26;--muted:#6B9E7A;--muted2:#A8CDB5;
  --green:#2ECC71;--green2:#27AE60;--green3:#1AAF5D;
  --orange:#FF6B35;--boks:#6C63FF;--padel:#00BCD4;
  --danger:#E74C3C;--amber:#F39C12;--cheat:#FF4757;
  --r:16px;--rsm:10px;
  --shadow:0 4px 20px rgba(46,204,113,0.15);
  --shadow-sm:0 2px 10px rgba(0,0,0,0.07);
  --shadow-card:0 3px 14px rgba(39,174,96,0.1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}
.app{display:flex;flex-direction:column;height:100dvh}

/* HEADER */
.header{padding:48px 16px 14px;background:linear-gradient(135deg,#2ECC71,#27AE60,#1AAF5D);flex-shrink:0;box-shadow:0 4px 20px rgba(46,204,113,0.35)}
.header-row{display:flex;align-items:center;justify-content:space-between}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:rgba(255,255,255,0.2);border-radius:10px;display:flex;align-items:center;justify-content:center;border:1.5px solid rgba(255,255,255,0.35);flex-shrink:0}
.logo-icon svg{width:22px;height:22px}
.logo-text{font-size:22px;font-weight:800;color:#fff;letter-spacing:-.5px}
.logo-text span{color:rgba(255,255,255,0.72)}
.logo-sub{font-size:11px;color:rgba(255,255,255,0.75);margin-top:1px;font-weight:500}
.gezin-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:rgba(255,255,255,0.2);border:1.5px solid rgba(255,255,255,0.4);border-radius:12px;padding:7px 11px;text-decoration:none;color:#fff;font-size:9px;font-weight:700;flex-shrink:0;letter-spacing:.4px}

/* NAVBAR */
.navbar{display:flex;background:#fff;border-bottom:1.5px solid var(--border);flex-shrink:0;box-shadow:var(--shadow-sm)}
.nav-btn{flex:1;padding:10px 2px 8px;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;color:var(--muted2);cursor:pointer;border:none;background:transparent;font-weight:600;letter-spacing:.2px}
.nav-btn.active{color:var(--green2)}
.nav-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* DAY TABS */
.day-tabs{background:#fff;padding:9px 12px 0;border-bottom:1.5px solid var(--border);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.day-tabs::-webkit-scrollbar{display:none}
.day-tabs-inner{display:flex;gap:5px;width:max-content;padding-bottom:9px}
.dtab{padding:7px 15px;border-radius:20px;font-size:12px;font-weight:700;border:1.5px solid transparent;color:var(--muted);cursor:pointer;background:transparent;white-space:nowrap;transition:.2s}
.dtab.active{color:#fff;border-color:var(--green);background:var(--green);box-shadow:0 3px 10px rgba(46,204,113,0.4)}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 40px;background:var(--bg)}

/* RECIPE CARDS */
.recipe-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow-card)}
.recipe-card.open{border-color:var(--green);box-shadow:0 6px 24px rgba(46,204,113,0.2)}
.rc-head{padding:13px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.rc-title{font-size:14px;font-weight:700;line-height:1.3;flex:1;color:var(--text)}
.rc-head-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.star-btn{background:none;border:none;cursor:pointer;font-size:20px;line-height:1;padding:0}
.chevron{color:var(--muted2);font-size:16px;transition:transform .25s;line-height:1}
.recipe-card.open .chevron{transform:rotate(90deg);color:var(--green)}
.rc-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.chip{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px}
.ck{background:#EEF0FF;color:#5C6BC0}
.cp{background:#E8F8EE;color:var(--green2)}
.ct{background:#F5F5F0;color:#9B7B5A}
.clc{background:#FFF8E1;color:#F57F17}
.cgv{background:#E8F5E9;color:#388E3C}
.cvote{background:#E8F8EE;color:var(--green2);font-weight:700}

/* RECIPE BODY */
.rc-body{display:none;padding:0 14px 14px}
.recipe-card.open .rc-body{display:block}
.sec-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted2);margin:12px 0 7px}

/* PORTIONS */
.portions-row{display:flex;align-items:center;gap:10px;background:var(--surf2);border-radius:var(--rsm);padding:8px 12px;border:1px solid var(--border)}
.portions-lbl{font-size:12px;color:var(--muted);flex:1;font-weight:500}
.portions-val{font-size:18px;font-weight:800;color:var(--green2);min-width:24px;text-align:center}
.port-btn{background:var(--green);border:none;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;cursor:pointer;flex-shrink:0}

/* MACRO BAR */
.macro-bar{display:flex;gap:6px}
.mbar-item{flex:1;background:linear-gradient(135deg,var(--surf2),var(--surf3));border-radius:var(--rsm);padding:7px 6px;text-align:center;border:1px solid var(--border)}
.mbar-val{font-size:14px;font-weight:800;color:var(--green2)}
.mbar-lbl{font-size:9px;color:var(--muted);margin-top:1px;font-weight:500}

/* INGREDIENTS */
.ing-list{display:flex;flex-direction:column}
.ing-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.ing-row:last-child{border:none}
.ing-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--border2);background:#fff;cursor:pointer;flex-shrink:0;margin-right:8px;display:flex;align-items:center;justify-content:center;transition:.15s}
.ing-check.checked{background:var(--green);border-color:var(--green)}
.ing-check.checked::after{content:'✓';font-size:11px;color:#fff;font-weight:800}
.ing-name{color:var(--text);flex:1;font-size:13px}
.ing-amount{color:var(--muted);font-size:12px;font-weight:600;margin-left:8px}

/* STEPS */
.steps{display:flex;flex-direction:column;gap:9px}
.step{display:flex;gap:9px;font-size:13px;line-height:1.6;color:var(--text)}
.snum{width:22px;height:22px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;margin-top:1px}

/* TIP */
.tip-box{background:linear-gradient(135deg,#FFFDE7,#FFF9C4);border:1.5px solid #FFE082;border-radius:var(--rsm);padding:9px 12px;font-size:12px;color:#5D4037;line-height:1.6;margin-top:12px;font-weight:500}

/* BUTTONS */
.add-groceries-btn{width:100%;margin-top:11px;padding:10px;border-radius:var(--rsm);background:linear-gradient(135deg,#E8F8EE,#D4F0DF);border:1.5px solid var(--green);color:var(--green2);font-size:13px;font-weight:700;cursor:pointer}

/* BANNERS */
.gv-banner{background:linear-gradient(135deg,#E8F5E9,#F1F8E9);border:1.5px solid #A5D6A7;border-radius:var(--rsm);padding:7px 11px;font-size:11px;color:#2E7D32;margin-bottom:12px;font-weight:600}

/* SPORT BAR */
.sport-bar{display:flex;align-items:center;gap:8px;padding:10px 12px;background:linear-gradient(135deg,var(--surf2),var(--surf3));border-radius:var(--rsm);border:1.5px solid var(--border);margin-bottom:12px;cursor:pointer}
.sport-bar-icons{display:flex;gap:4px;font-size:18px}
.sport-bar-label{font-size:11px;color:var(--muted);font-weight:600;flex:1}
.sport-bar-arrow{font-size:14px;color:var(--muted2)}

/* VOTE BUTTON */
.vote-main-btn{width:100%;padding:12px;border-radius:var(--rsm);background:linear-gradient(135deg,#FFE082,#FFD54F);border:none;color:#5D4037;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 3px 12px rgba(255,213,79,0.4);margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:8px}

/* WINNER BANNER */
.winner-banner{background:linear-gradient(135deg,#E8F8EE,#D4F0DF);border:2px solid var(--green);border-radius:var(--r);padding:12px 14px;margin-bottom:12px}

/* UIT ETEN */
.uieten-row{display:flex;gap:8px;margin-bottom:12px}
.uieten-btn{flex:1;padding:9px;border-radius:var(--rsm);border:1.5px solid var(--border2);background:#fff;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;transition:.2s}
.uieten-btn.active{border-color:var(--green);background:linear-gradient(135deg,#E8F8EE,#D4F0DF);color:var(--green2)}

/* SNACK SECTION */
.snack-section{background:linear-gradient(135deg,#FFFDE7,#FFF8E1);border:2px solid #FFE082;border-radius:var(--r);margin-top:8px;overflow:hidden}
.snack-head{padding:11px 14px;border-bottom:1px solid rgba(255,224,130,0.5);display:flex;align-items:center;justify-content:space-between}
.snack-title{font-size:12px;font-weight:700;color:#5D4037}
.snack-person-tabs{display:flex;gap:6px;padding:10px 14px;border-bottom:1px solid rgba(255,224,130,0.4);overflow-x:auto;scrollbar-width:none}
.snack-person-tabs::-webkit-scrollbar{display:none}
.snack-ptab{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid #FFE082;background:#fff;color:#9B7B5A;cursor:pointer;white-space:nowrap}
.snack-ptab.active{background:var(--green);border-color:var(--green);color:#fff}
.snack-items{padding:10px 14px;display:flex;flex-direction:column;gap:7px}
.snack-item{background:#fff;border-radius:var(--rsm);padding:10px 12px;border:1px solid rgba(255,224,130,0.5)}
.snack-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px}
.snack-meta{font-size:11px;color:var(--muted);font-weight:500}
.snack-tip{font-size:11px;color:#7B5E2A;margin-top:3px;font-weight:500}

/* GROCERIES */
.grocery-section{background:#fff;border:1.5px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow-card)}
.grocery-head{padding:11px 14px;font-size:12px;font-weight:700;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.grocery-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border);font-size:13px;cursor:pointer}
.grocery-item:last-child{border:none}
.grocery-item.done .grocery-name{text-decoration:line-through;color:var(--muted2)}
.grocery-name{flex:1}
.grocery-amount{color:var(--muted);font-size:12px;font-weight:600}
.clear-btn{background:none;border:1.5px solid var(--border2);border-radius:var(--rsm);padding:5px 10px;color:var(--muted);font-size:11px;cursor:pointer;font-weight:600}

/* EMPTY */
.empty-state{text-align:center;padding:50px 20px;color:var(--muted2)}
.empty-state .icon{font-size:44px;margin-bottom:14px}
.empty-state p{font-size:13px;line-height:1.7;color:var(--muted)}

/* FAV */
.fav-day-label{font-size:10px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.07em;margin:14px 0 7px}

/* SECTION HEAD */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-head h2{font-size:18px;font-weight:800;color:var(--text)}

/* FORM */
.form-section{background:#fff;border:1.5px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--shadow-card)}
.form-title{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text)}
.field{margin-bottom:10px}
.field label{display:block;font-size:10px;color:var(--muted);margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.field input,.field select,.field textarea{width:100%;background:var(--surf2);border:1.5px solid var(--border2);border-radius:var(--rsm);padding:9px 11px;color:var(--text);font-size:13px;font-family:inherit;font-weight:500}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--green)}
.field textarea{min-height:70px;resize:vertical;line-height:1.5}
.ing-form-row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.ing-form-row input{flex:1;min-width:0}
.ing-form-row input.sm{width:70px;flex:none}
.remove-ing{background:none;border:none;color:var(--danger);font-size:18px;cursor:pointer;flex-shrink:0;line-height:1}
.day-checks{display:flex;flex-wrap:wrap;gap:6px}
.day-check{display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;font-weight:500}
.day-check input{accent-color:var(--green)}
.submit-btn{width:100%;padding:13px;border-radius:var(--rsm);background:linear-gradient(135deg,#2ECC71,#27AE60);border:none;color:#fff;font-size:14px;font-weight:800;cursor:pointer;margin-top:4px;box-shadow:0 4px 15px rgba(46,204,113,0.4)}
.add-ing-btn{background:none;border:1.5px dashed var(--border2);border-radius:var(--rsm);width:100%;padding:7px;color:var(--muted);font-size:12px;cursor:pointer;margin-bottom:8px;font-weight:600}
.toggle-row{display:flex;background:var(--surf2);border-radius:20px;padding:3px}
.toggle-opt{flex:1;padding:6px;text-align:center;font-size:12px;font-weight:700;color:var(--muted);border-radius:17px;cursor:pointer}
.toggle-opt.active{background:#fff;color:var(--text);box-shadow:var(--shadow-sm)}

/* IMPORT */
.import-box{background:#fff;border:1.5px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--shadow-card)}
.import-title{font-size:14px;font-weight:700;margin-bottom:4px;color:var(--text)}
.import-sub{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.6;font-weight:500}
.import-input-row{display:flex;gap:8px}
.import-input-row input{flex:1;background:var(--surf2);border:1.5px solid var(--border2);border-radius:var(--rsm);padding:9px 11px;color:var(--text);font-size:13px;font-family:inherit}
.import-btn{padding:10px 14px;border-radius:var(--rsm);background:linear-gradient(135deg,#2ECC71,#27AE60);border:none;color:#fff;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.import-btn:disabled{opacity:.5;cursor:not-allowed}
.loading-bar{display:flex;align-items:center;gap:10px;padding:12px;background:var(--surf2);border-radius:var(--rsm);margin-top:10px;font-size:13px;color:var(--muted);font-weight:500}
.spinner{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.api-key-section{background:linear-gradient(135deg,#FFFDE7,#FFF9C4);border:1.5px solid #FFE082;border-radius:var(--rsm);padding:12px;margin-bottom:12px}
.api-key-section label{display:block;font-size:10px;color:#7B5E2A;margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.api-key-row{display:flex;gap:8px}
.api-key-row input{flex:1;background:#fff;border:1.5px solid #FFE082;border-radius:var(--rsm);padding:8px 10px;color:var(--text);font-size:12px;font-family:monospace}
.api-key-row button{padding:8px 12px;border-radius:var(--rsm);background:linear-gradient(135deg,#2ECC71,#27AE60);border:none;color:#fff;font-size:12px;font-weight:700;cursor:pointer}
.import-result h3{font-size:14px;font-weight:700;margin-bottom:8px;color:var(--green2)}
.import-actions{display:flex;gap:8px;margin-top:10px}
.import-actions button{flex:1;padding:9px;border-radius:var(--rsm);font-size:13px;font-weight:700;cursor:pointer;border:none}
.btn-save{background:linear-gradient(135deg,#2ECC71,#27AE60);color:#fff}
.btn-cancel{background:#f5f5f0;color:var(--muted);border:1.5px solid var(--border2) !important}

/* BARCODE SCANNER */
.scan-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border-radius:20px;background:linear-gradient(135deg,#2ECC71,#27AE60);border:none;color:#fff;font-size:12px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(46,204,113,0.35)}
.scanner-overlay{position:fixed;inset:0;background:#000;z-index:2000;display:flex;flex-direction:column}
.scanner-header{padding:52px 16px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.scanner-title{font-size:16px;font-weight:800;color:#fff}
.scanner-close{background:rgba(255,255,255,0.2);border:none;color:#fff;font-size:24px;cursor:pointer;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.scanner-viewport{flex:1;position:relative;overflow:hidden}
.scanner-viewport video{width:100%;height:100%;object-fit:cover}
.scanner-line{position:absolute;left:10%;right:10%;height:2px;background:var(--green);box-shadow:0 0 8px rgba(46,204,113,0.8);animation:scanline 2s ease-in-out infinite;top:50%}
@keyframes scanline{0%,100%{transform:translateY(-60px)}50%{transform:translateY(60px)}}
.scanner-frame{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.scanner-box{width:240px;height:160px;border:2px solid rgba(46,204,113,0.8);border-radius:12px;box-shadow:0 0 0 9999px rgba(0,0,0,0.5)}
.scanner-hint{position:absolute;bottom:0;left:0;right:0;padding:20px;text-align:center;color:rgba(255,255,255,0.8);font-size:13px;font-weight:500;background:linear-gradient(transparent,rgba(0,0,0,0.7))}
.scanner-result{position:absolute;bottom:0;left:0;right:0;background:#fff;border-radius:24px 24px 0 0;padding:20px;transform:translateY(100%);transition:.3s}
.scanner-result.show{transform:translateY(0)}
.scanner-product-name{font-size:15px;font-weight:800;color:var(--text);margin-bottom:6px}
.scanner-product-meta{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:12px}
.scanner-macros{display:flex;gap:8px;margin-bottom:14px}
.scanner-macro{flex:1;background:var(--surf2);border-radius:var(--rsm);padding:8px;text-align:center}
.scanner-macro .v{font-size:16px;font-weight:800;color:var(--green2)}
.scanner-macro .l{font-size:9px;color:var(--muted);font-weight:600}
.scanner-person-select{margin-bottom:12px}
.scanner-person-select label{display:block;font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.scanner-person-btns{display:flex;flex-wrap:wrap;gap:6px}
.scanner-person-btn{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--border2);background:#fff;color:var(--muted);cursor:pointer}
.scanner-person-btn.sel{border-color:var(--green);background:var(--green);color:#fff}
.scanner-add-btn{width:100%;padding:12px;border-radius:var(--rsm);background:linear-gradient(135deg,#2ECC71,#27AE60);border:none;color:#fff;font-size:14px;font-weight:800;cursor:pointer}
.scanner-error{color:var(--danger);font-size:13px;text-align:center;padding:10px}

/* DAG TRACKER v2 */
.moment-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden;box-shadow:var(--shadow-card)}
.moment-card.open{border-color:var(--green)}
.moment-head{padding:11px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.moment-icon{font-size:20px;flex-shrink:0}
.moment-info{flex:1}
.moment-name{font-size:13px;font-weight:700;color:var(--text)}
.moment-sub{font-size:11px;color:var(--muted);font-weight:500;margin-top:1px}
.moment-right{text-align:right;flex-shrink:0}
.moment-kcal{font-size:13px;font-weight:800;color:var(--green2)}
.moment-chevron{color:var(--muted2);font-size:16px;transition:transform .2s}
.moment-card.open .moment-chevron{transform:rotate(90deg);color:var(--green)}
.moment-body{display:none;padding:0 14px 12px;border-top:1px solid var(--border)}
.moment-card.open .moment-body{display:block}
.log-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.log-item:last-child{border:none}
.log-name{flex:1;color:var(--text);font-weight:500}

  const age=getAge(person.dob||'2000-01-01');
  const isKid=age<16;

  if(isToddler){
    return [

const DEFAULT_RECIPES=[

function loadState(){
  try{
    const s=localStorage.getItem('gezinfit-v1');
    if(s){
      const p=JSON.parse(s);
      state.favorites=new Set(p.favorites||[]);
      state.groceries=p.groceries||[];
      state.portions=p.portions||{};
      state.apiKey=p.apiKey||'';
      state.recipes=[...DEFAULT_RECIPES,...(p.customRecipes||[])];
    } else { state.recipes=[...DEFAULT_RECIPES]; }
  } catch(e){ state.recipes=[...DEFAULT_RECIPES]; }
  const today=new Date().getDay();
  state.activeDay=today===0?6:today-1;
}

function saveState(){
  localStorage.setItem('gezinfit-v1',JSON.stringify({
    favorites:[...state.favorites],groceries:state.groceries,
    customRecipes:state.recipes.filter(r=>r.custom),
    portions:state.portions,apiKey:state.apiKey
  }));
}

function getAge(dob){
  if(!dob) return 30;
  const b=new Date(dob),t=new Date();
  let a=t.getFullYear()-b.getFullYear();
  if(t.getMonth()<b.getMonth()||(t.getMonth()===b.getMonth()&&t.getDate()<b.getDate())) a--;
  return a;
}

function getSchedule(){
  try{ return JSON.parse(localStorage.getItem('gezinfit-schedule')||'{}'); } catch(e){ return {}; }
}

function getDurations(){
  try{ return JSON.parse(localStorage.getItem('gezinfit-durations')||'{}'); } catch(e){ return {}; }
}

function getPortions(id){ return state.portions[id]||5; }

function scaleAmount(str,portions){
  const f=portions/5;
  if(f===1) return str;
  return str.replace(/(\d+([.,]\d+)?)/g,m=>{
    const n=parseFloat(m.replace(',','.'));
    if(isNaN(n)) return m;
    const s=n*f;
    const r=Number.isInteger(s)?s:Math.round(s*10)/10;
    return String(r).replace('.',',');
  });
}

function getVotesKey(){ return 'gezinfit-votes-'+new Date().toISOString().split('T')[0]; }

function getVotes(){
  try{ return JSON.parse(localStorage.getItem(getVotesKey())||'{}'); } catch(e){ return {}; }
}

function saveVotes(votes){
  localStorage.setItem(getVotesKey(), JSON.stringify(votes));
}

function toggleVote(recipeId,personId){
  const votes=getVotes();
  if(!votes[recipeId]) votes[recipeId]=[];
  const idx=votes[recipeId].indexOf(personId);
  if(idx>-1) votes[recipeId].splice(idx,1);
  else votes[recipeId].push(personId);
  saveVotes(votes);
  const modal=document.getElementById('vote-modal');
  if(modal){ const day=parseInt(modal.dataset.day||state.activeDay); showVoteModal(day); }
  else if(state.activeTab==='menu') renderMenu();
}

function exportVotes(){
  const votes=getVotes();
  const encoded=btoa(JSON.stringify(votes));
  const url=window.location.href.split('?')[0]+'?votes='+encoded;
  if(navigator.share){
    navigator.share({title:'Gezinfit stemmen',url}).catch(()=>{});
  } else {
    navigator.clipboard.writeText(url).then(()=>alert('Link gekopieerd! Stuur naar je gezin.'));
  }
}

function importVotesFromURL(){
  const params=new URLSearchParams(window.location.search);
  const v=params.get('votes');
  if(!v) return;
  try{
    const incoming=JSON.parse(atob(v));
    const existing=getVotes();
    // Merge votes
    Object.entries(incoming).forEach(([recipeId,voters])=>{
      if(!existing[recipeId]) existing[recipeId]=[];
      voters.forEach(pid=>{ if(!existing[recipeId].includes(pid)) existing[recipeId].push(pid); });
    });
    saveVotes(existing);
    // Clean URL
    window.history.replaceState({},'',window.location.pathname);
    setTimeout(()=>alert('✅ Stemmen van je gezin zijn samengevoegd!'),500);
  } catch(e){}
}

function getSportBar(day){
  try{
    const schedule=getSchedule();
    const profiles=getProfiles().length?getProfiles():getDefaultProfiles();
    const durations=getDurations();
    const dayS=schedule[day]||{};
    const items=[];
    profiles.forEach(p=>{
      (dayS[p.id]||[]).forEach(s=>{
        const dur=(durations[p.id]&&durations[p.id][s])||60;
        items.push({emoji:p.emoji,name:p.name,sport:s,sportEmoji:SPORT_EMOJI_MAP[s]||'🏃',dur});
      });
    });
    if(!items.length) return '';
    const uniqueEmojis=[...new Set(items.map(i=>i.sportEmoji))].slice(0,5);
    return `<div class="sport-bar" onclick="showSportModal(${day})">
      <div class="sport-bar-icons">${uniqueEmojis.join('')}</div>
      <span class="sport-bar-label">${items.length} sporter${items.length>1?'s':''} vandaag</span>
      <span class="sport-bar-arrow">›</span>
    </div>`;
  } catch(e){ return ''; }
}

              <span style="font-size:11px;color:var(--muted);font-weight:500">Duur:</span>
              <select onchange="saveDuration('${item.pid}','${item.sport}',this.value)" style="background:#fff;border:1.5px solid var(--border2);border-radius:8px;padding:3px 8px;color:var(--text);font-size:12px;font-weight:600">
                ${[15,20,30,45,60,75,90,120].map(m=>`<option value="${m}"${item.dur===m?' selected':''}>${m} min</option>`).join('')}
              </select>
              <span style="font-size:11px;color:var(--green2);font-weight:600">≈ ${Math.round(item.dur*7)} kcal</span>
            </div>
          </div>
        </div>`).join('')}
      ${items.length>0?`<div style="background:linear-gradient(135deg,var(--surf2),var(--surf3));border-radius:var(--rsm);padding:10px 12px;margin-top:4px">
        <div style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Totaal verbrand vandaag</div>
        <div style="font-size:20px;font-weight:800;color:var(--green2)">${totalBurn} kcal</div>
      </div>`:''}
    </div>
  </div>`;
  document.body.appendChild(overlay);
}

function saveDuration(personId,sport,minutes){
  const d=getDurations();
  if(!d[personId]) d[personId]={};
  d[personId][sport]=parseInt(minutes)||60;
  localStorage.setItem('gezinfit-durations',JSON.stringify(d));
}

// UIT ETEN
// ============================================================
function getUitEtenKey(day){ return 'gezinfit-uieten-'+day+'-'+new Date().toISOString().split('T')[0]; }
function isUitEten(day,type){ const k=getUitEtenKey(day); return localStorage.getItem(k)==='1'&&localStorage.getItem(k+'-type')===type; }
function toggleUitEten(day,type){
  const k=getUitEtenKey(day);
  if(isUitEten(day,type)){ localStorage.removeItem(k); localStorage.removeItem(k+'-type'); }
  else { localStorage.setItem(k,'1'); localStorage.setItem(k+'-type',type); }
  renderMenu();
}

// ============================================================
// SWITCH TAB
// ============================================================
function switchTab(tab){
  state.activeTab=tab;
  document.querySelectorAll('.tab-content').forEach(el=>el.style.display='none');
  document.querySelectorAll('.nav-btn').forEach(el=>el.classList.remove('active'));
  const tabEl=document.getElementById('tab-'+tab);
  if(tabEl){tabEl.style.display='flex';tabEl.style.flexDirection='column';}
  const navEl=document.getElementById('nav-'+tab);
  if(navEl) navEl.classList.add('active');
  if(tab==='menu') renderMenu();
  else if(tab==='dag') renderDag();
  else if(tab==='favs') renderFavs();
  else if(tab==='groceries') renderGroceries();
  else if(tab==='import') renderImport();
  else if(tab==='add') renderAddForm();
}

// RENDER MENU
// ============================================================
function renderDayTabs(){
  document.getElementById('day-tabs-inner').innerHTML=DAYS.map((d,i)=>
    `<button class="dtab${i===state.activeDay?' active':''}" onclick="setDay(${i})">${d}</button>`
  ).join('');
}

function renderMenu(){
  renderDayTabs();
  const day=state.activeDay;
  const profiles=getProfiles().length?getProfiles():getDefaultProfiles();
  const avgKcal=profiles.length?Math.round(profiles.reduce((s,p)=>s+(p.kcalTarget||2000),0)/profiles.length):2000;
  const votes=getVotes();

  // Sort recipes: most voted first, then by calorie fit
  const allRecipes=state.recipes.filter(r=>r.day===day||(Array.isArray(r.days)&&r.days.includes(day)));
  const recipes=allRecipes.sort((a,b)=>{
    const va=(votes[a.id]||[]).length, vb=(votes[b.id]||[]).length;
    if(vb!==va) return vb-va;
    return Math.abs((a.kcal||500)-avgKcal)-Math.abs((b.kcal||500)-avgKcal);
  }).slice(0,3);

  // Winner
  let topRecipe=null, topCount=0;
  recipes.forEach(r=>{ const c=(votes[r.id]||[]).length; if(c>topCount){topCount=c;topRecipe=r;} });

  const lunchUit=isUitEten(day,'lunch'), avondUit=isUitEten(day,'avond');

  let html=`<div style="font-size:22px;font-weight:800;margin-bottom:8px;color:var(--text)">${DAY_NAMES[day]}</div>`;
  html+=getSportBar(day);
  html+=`<div class="uieten-row">
    <button class="uieten-btn${lunchUit?' active':''}" onclick="toggleUitEten(${day},'lunch')">🍴 Lunch buiten de deur${lunchUit?' ✓':''}</button>
    <button class="uieten-btn${avondUit?' active':''}" onclick="toggleUitEten(${day},'avond')">🍽️ Diner buiten de deur${avondUit?' ✓':''}</button>
  </div>`;
  // Dynamic GV banner based on profiles
  const gvPersons = profiles.filter(p=>(p.allergies||[]).includes('Gluten (coeliakie)')).map(p=>p.name);
  const otherAllergies = [...new Set(profiles.flatMap(p=>(p.allergies||[]).filter(a=>a!=='Geen'&&a!=='Gluten (coeliakie)')))];
  let bannerText = '🌾 Alle recepten glutenvrij';
  if(gvPersons.length>0) bannerText += ` — ook veilig voor ${gvPersons.join(' & ')}`;
  if(otherAllergies.length>0) bannerText += ` · Let op: ${otherAllergies.join(', ')}`;
  bannerText += ` · ${profiles.length} personen`;
  html+=`<div class="gv-banner">${bannerText}</div>`;

  // Vote winner banner
  if(topRecipe&&topCount>0){
    const voterNames=(votes[topRecipe.id]||[]).map(pid=>{const p=profiles.find(x=>x.id===pid);return p?p.emoji+' '+p.name:pid;}).join(', ');
    html+=`<div class="winner-banner">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
        <span style="font-size:20px">🏆</span>
        <div><div style="font-size:10px;font-weight:700;color:var(--green2);text-transform:uppercase;letter-spacing:.05em">Meest gestemd — ${topCount} stem${topCount>1?'men':''}</div>
        <div style="font-size:14px;font-weight:800;color:var(--text)">${topRecipe.name}</div></div>
      </div>
      <div style="font-size:11px;color:var(--muted);font-weight:500">${voterNames}</div>
    </div>`;
  }

  // Stem knop — dynamisch op basis van stemmen
  const allVotes = Object.values(votes).flat();
  const votersToday = [...new Set(allVotes)];
  const totalPersons = profiles.length;
  const allVoted = votersToday.length >= totalPersons;
  const someVoted = votersToday.length > 0 && !allVoted;
  const notVoted = profiles.filter(p=>!votersToday.includes(p.id));

  if(!allVoted){
    let voteLabel = '👍 Stem — wat wil jij vanavond?';
    if(someVoted){
      const notVotedNames = notVoted.map(p=>p.emoji+' '+p.name).join(', ');
      voteLabel = `👍 Nog niet gestemd: ${notVotedNames}`;
    }
    html+=`<button class="vote-main-btn" onclick="showVoteModal(${day})">${voteLabel}</button>`;
  }

  html+=`<div style="font-size:13px;font-weight:700;margin-bottom:10px;color:var(--text)">🍽️ Avondmaaltijd${avondUit?' <span style="font-size:11px;color:var(--muted);font-weight:500">(Vanavond buiten de deur)</span>':''}</div>`;

  if(!recipes.length){
    html+=`<div class="empty-state"><div class="icon">🍽️</div><p>Nog geen recepten voor deze dag.<br>Voeg er een toe via het + tabblad.</p></div>`;
  } else {
    recipes.forEach(r=>{html+=renderRecipeCard(r,'');});
  }

  html+=`<div style="font-size:13px;font-weight:700;margin:14px 0 8px;color:var(--text)">🌙 Avondsnack</div>`;
  html+=renderPersonalSnacks(day);
  document.getElementById('menu-scroll').innerHTML=html;
}

    body=`<div class="rc-body">
      <div class="sec-lbl">Porties aanpassen</div>
      <div class="portions-row" style="margin-bottom:8px">
        <span class="portions-lbl">Aantal personen</span>
        <button class="port-btn" onclick="changePortion('${r.id}','${context||''}',-1)">−</button>
        <span class="portions-val">${portions}</span>
        <button class="port-btn" onclick="changePortion('${r.id}','${context||''}',1)">+</button>
      </div>
      <div class="macro-bar" style="margin-bottom:12px">
        <div class="mbar-item"><div class="mbar-val">${sk}</div><div class="mbar-lbl">kcal totaal</div></div>
        <div class="mbar-item"><div class="mbar-val">${Math.round(sk/portions)}</div><div class="mbar-lbl">kcal p.p.</div></div>
        <div class="mbar-item"><div class="mbar-val">${sp}g</div><div class="mbar-lbl">eiwit totaal</div></div>
        <div class="mbar-item"><div class="mbar-val">${Math.round(sp/portions)}g</div><div class="mbar-lbl">eiwit p.p.</div></div>
      </div>
      <div class="sec-lbl">Ingrediënten — ${portions} personen</div>
      <div class="ing-list">
        ${r.ing.map((ing,i)=>{
          const scaled=scaleAmount(ing[1],portions);
          const checked=isGroceryChecked(r.id,i);
          return `<div class="ing-row"><div class="ing-check${checked?' checked':''}" onclick="toggleIngCheck('${r.id}',${i},'${(ing[0]+'').replace(/'/g,"\\'")}','${scaled.replace(/'/g,"\\'")}')"></div><span class="ing-name">${ing[0]}</span><span class="ing-amount">${scaled}</span></div>`;
        }).join('')}
      </div>
      <button class="add-groceries-btn" onclick="addAllToGroceries('${r.id}')">+ Alle ingrediënten naar boodschappenlijst</button>
      <div class="sec-lbl">Bereiding</div>
      <div class="steps">${r.steps.map((s,i)=>`<div class="step"><div class="snum">${i+1}</div><span>${s}</span></div>`).join('')}</div>
      <div class="tip-box">💡 ${r.tip}</div>
      ${r.custom?`<button class="clear-btn" style="margin-top:10px;width:100%;color:var(--danger);border-color:var(--danger)" onclick="deleteRecipe('${r.id}')">Recept verwijderen</button>`:''}
    </div>`;
  }
  return `<div class="recipe-card${isOpen?' open':''}" id="rc-${r.id}${context||''}">
    <div class="rc-head" onclick="toggleRecipe('${r.id}','${context||''}')">
      <div style="flex:1">
        <div class="rc-title">${r.name}</div>
        <div class="rc-chips">
          <span class="chip ck">${sk} kcal</span>
          <span class="chip cp">${sp}g eiwit</span>
          <span class="chip ct">${r.time} min</span>
          ${r.lowcarb?'<span class="chip clc">Low-carb</span>':''}
          ${r.gv?'<span class="chip cgv">GV</span>':''}

        </div>

function toggleRecipe(id,context){
  const key=id+(context||'');
  state.openRecipe=state.openRecipe===key?null:key;
  if(state.activeTab==='menu') renderMenu();
  else if(state.activeTab==='favs') renderFavs();
  if(state.openRecipe){
    setTimeout(()=>{ const el=document.getElementById('rc-'+key); if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'}); },50);
  }
}

function toggleFav(e,id){
  e.stopPropagation();
  if(state.favorites.has(id)) state.favorites.delete(id);
  else state.favorites.add(id);
  saveState();
  if(state.activeTab==='menu') renderMenu();
  else if(state.activeTab==='favs') renderFavs();
}

function changePortion(id,context,delta){
  state.portions[id]=Math.max(1,Math.min(12,getPortions(id)+delta));
  saveState();
  if(state.activeTab==='menu') renderMenu();
  else if(state.activeTab==='favs') renderFavs();
}

function setDay(i){
  state.activeDay=i; state.openRecipe=null;
  renderMenu();
  document.getElementById('menu-scroll').scrollTop=0;
}

// ============================================================
// GROCERIES
// ============================================================
function isGroceryChecked(recipeId,ingIndex){ return state.groceries.some(g=>g.recipeId===recipeId&&g.ingIndex===ingIndex&&g.done); }

function toggleIngCheck(recipeId,ingIndex,name,amount){
  const existing=state.groceries.find(g=>g.recipeId===recipeId&&g.ingIndex===ingIndex);
  if(existing) existing.done=!existing.done;
  else state.groceries.push({recipeId,ingIndex,name,amount,done:false,id:Date.now()+''});
  saveState();
  if(state.activeTab==='menu') renderMenu();
  else if(state.activeTab==='favs') renderFavs();
}

function addAllToGroceries(recipeId){
  const r=state.recipes.find(rec=>rec.id===recipeId);
  if(!r) return;
  const portions=getPortions(recipeId);
  r.ing.forEach((ing,i)=>{
    const scaled=scaleAmount(ing[1],portions);
    if(!state.groceries.find(g=>g.recipeId===recipeId&&g.ingIndex===i))
      state.groceries.push({recipeId,ingIndex:i,name:ing[0],amount:scaled,done:false,id:Date.now()+'-'+i});
  });
  saveState();
  alert('✅ Alle ingrediënten toegevoegd!');
  switchTab('groceries');
}

function renderGroceries(){
  const items=state.groceries;
  let html=`<div class="section-head"><h2>🛒 Boodschappen</h2>${items.length?`<button class="clear-btn" onclick="clearDoneGroceries()">Verwijder afgevinkt</button>`:''}</div>`;
  if(!items.length){ html+=`<div class="empty-state"><div class="icon">🛒</div><p>Nog geen boodschappen.<br>Open een recept en vink ingrediënten aan.</p></div>`; }
  else {
    const grouped={};
    items.forEach(g=>{ const r=state.recipes.find(rec=>rec.id===g.recipeId); const label=r?r.name:'Overig'; if(!grouped[label]) grouped[label]=[]; grouped[label].push(g); });
    Object.entries(grouped).forEach(([label,gItems])=>{
      html+=`<div class="grocery-section"><div class="grocery-head"><span>${label}</span><button class="clear-btn" onclick="removeRecipeGroceries('${gItems[0].recipeId}')">Verwijder</button></div>
        ${gItems.map(g=>`<div class="grocery-item${g.done?' done':''}" onclick="toggleGrocery('${g.id}')"><div class="ing-check${g.done?' checked':''}"></div><span class="grocery-name">${g.name}</span><span class="grocery-amount">${g.amount}</span></div>`).join('')}
      </div>`;
    });
  }
  document.getElementById('groceries-scroll').innerHTML=html;
}

function toggleGrocery(id){ const item=state.groceries.find(g=>g.id===id); if(item){item.done=!item.done;saveState();renderGroceries();} }
function clearDoneGroceries(){ state.groceries=state.groceries.filter(g=>!g.done); saveState();renderGroceries(); }
function removeRecipeGroceries(recipeId){ state.groceries=state.groceries.filter(g=>g.recipeId!==recipeId); saveState();renderGroceries(); }

// ============================================================
// FAVS
// ============================================================
function renderFavs(){
  const favRecipes=state.recipes.filter(r=>state.favorites.has(r.id));
  let html=`<div class="section-head"><h2>⭐ Favorieten</h2><span style="font-size:12px;color:var(--muted);font-weight:600">${favRecipes.length} recepten</span></div>`;
  if(!favRecipes.length){ html+=`<div class="empty-state"><div class="icon">☆</div><p>Nog geen favorieten.<br>Tik op de ster bij een recept.</p></div>`; }

        <div class="moment-sub">${items.length ? items.length+' product'+(items.length>1?'en':'') : 'Nog niets'}</div>
      </div>
      <div class="moment-right">
        <div class="moment-kcal">${mKcal > 0 ? mKcal+' kcal' : '—'}</div>
        ${mProt > 0 ? `<div style="font-size:10px;color:var(--muted);font-weight:500">${mProt}g eiwit</div>` : ''}
      </div>
      <span class="moment-chevron">›</span>
    </div>
    ${body}
  </div>`;
}

function renderLibraryPicker(personId, mealType){
  const lib = getMealLibrary();
  // Also include today's dinner recipes
  const dayRecipes = state.recipes.filter(r=>r.day===state.activeDay||(Array.isArray(r.days)&&r.days.includes(state.activeDay)));
  if(!lib.length && !dayRecipes.length) return `<div style="font-size:12px;color:var(--muted2);padding:8px 0;font-style:italic">Bibliotheek is nog leeg. Voeg producten toe via handmatig of scan.</div>`;
  
  let html = `<div style="background:var(--surf2);border-radius:var(--rsm);padding:8px;margin-top:6px">`;
  
  if(dayRecipes.length > 0){
    html += `<div style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">🍽️ Avondmenu van vandaag</div>`;
    dayRecipes.slice(0,3).forEach(r=>{
      html += `<div class="lib-item" onclick="addRecipeToMoment('${personId}','${mealType}','${r.id}')">
        <div style="flex:1"><div class="lib-name" style="font-size:12px">${r.name}</div><div class="lib-meta">${r.kcal} kcal · ${r.prot}g eiwit p.p.</div></div>
        <button class="lib-add" onclick="event.stopPropagation();addRecipeToMoment('${personId}','${mealType}','${r.id}')">+</button>
      </div>`;
    });
    if(lib.length) html += `<div style="height:1px;background:var(--border);margin:6px 0"></div>`;
  }

  if(lib.length > 0){
    html += `<div style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">📚 Mijn bibliotheek</div>`;
    lib.slice(0,10).forEach(item=>{
      html += `<div class="lib-item" onclick="addLibItemToMoment('${personId}','${mealType}','${item.id}')">
        <div style="flex:1"><div class="lib-name" style="font-size:12px">${item.name}</div><div class="lib-meta">${item.kcal} kcal · ${item.prot}g eiwit</div></div>
        <button class="lib-add" onclick="event.stopPropagation();addLibItemToMoment('${personId}','${mealType}','${item.id}')">+</button>
      </div>`;
    });
  }
  html += `</div>`;
  return html;
}

let openMoment = null;
let openQuickForm = {};
let openLibrary = null;

function toggleMoment(personId, mealKey){
  const key = personId+'-'+mealKey;
  openMoment = openMoment === key ? null : key;
  openLibrary = null;
  renderDag();
}

function toggleQuickForm(qfKey){
  openQuickForm[qfKey] = !openQuickForm[qfKey];
  renderDag();
}

function toggleLibraryPicker(personId, mealKey){
  const key = personId+'-'+mealKey;
  openLibrary = openLibrary === key ? null : key;
  renderDag();
}

function quickAdd(personId, mealType, qfKey){
  const name = document.getElementById(qfKey+'-name')?.value?.trim();
  const kcal = parseInt(document.getElementById(qfKey+'-kcal')?.value)||0;
  const prot = parseFloat(document.getElementById(qfKey+'-prot')?.value)||0;
  if(!name){ alert('Vul een naam in.'); return; }
  const saveLib = document.getElementById(qfKey+'-savelib')?.checked;
  if(saveLib) addToLibrary(name, kcal, prot);
  addLogItem(personId, mealType, name, kcal, prot);
}

function addLogItem(personId, mealType, name, kcal, prot){
  const data = loadPersonDag(personId);
  if(!data.meals[mealType]) data.meals[mealType] = [];
  data.meals[mealType].push({idx:'log-'+Date.now(), name, kcal:parseInt(kcal)||0, prot:parseFloat(prot)||0});
  savePersonDag(personId, data);
  openQuickForm = {};
  openLibrary = null;
  renderDag();
}

function removeLogItem(personId, mealType, idx){
  const data = loadPersonDag(personId);
  if(data.meals[mealType]) data.meals[mealType] = data.meals[mealType].filter(m=>m.idx!==idx);
  savePersonDag(personId, data);
  renderDag();
}

function addLibItemToMoment(personId, mealType, libId){
  const item = getMealLibrary().find(i=>i.id===libId);
  if(!item) return;
  addLogItem(personId, mealType, item.name, item.kcal, item.prot);
}

function addRecipeToMoment(personId, mealType, recipeId){
  const r = state.recipes.find(rec=>rec.id===recipeId);
  if(!r) return;
  const portions = getPortions(recipeId);
  const kcalPP = Math.round(r.kcal * portions / 5);
  const protPP = Math.round(r.prot * portions / 5);
  addLogItem(personId, mealType, r.name+' (avondmenu)', kcalPP, protPP);
}

function addMenuRecipe(personId, mealType){
  openLibrary = personId+'-'+mealType;
  renderDag();
}

function getDagKey(personId){ return 'dag-'+personId+'-'+new Date().toISOString().split('T')[0]; }
function loadPersonDag(personId){ try{ return JSON.parse(localStorage.getItem(getDagKey(personId))||'{"meals":{}}'); } catch(e){ return {meals:{}}; } }
function savePersonDag(personId,data){ localStorage.setItem(getDagKey(personId),JSON.stringify(data)); }

function calcPersonTotal(personId){
  const data=loadPersonDag(personId);
  let kcal=0,prot=0;
  Object.values(data.meals||{}).forEach(meals=>meals.forEach(m=>{kcal+=m.kcal||0;prot+=m.prot||0;}));
  return {kcal,prot};
}

function toggleMeal(personId,mealType,mealIdx,name,kcal,prot){
  const data=loadPersonDag(personId);
  if(!data.meals[mealType]) data.meals[mealType]=[];
  const existing=data.meals[mealType].find(m=>m.idx===mealIdx);
  if(existing) data.meals[mealType]=data.meals[mealType].filter(m=>m.idx!==mealIdx);
  else data.meals[mealType].push({idx:mealIdx,name,kcal,prot});
  savePersonDag(personId,data);
  renderDag();
}

function addCustomMeal(personId,mealType){
  const nEl=document.getElementById('cm-name-'+personId+'-'+mealType);
  const kEl=document.getElementById('cm-kcal-'+personId+'-'+mealType);
  const pEl=document.getElementById('cm-prot-'+personId+'-'+mealType);
  if(!nEl||!nEl.value.trim()) return;
  const data=loadPersonDag(personId);
  if(!data.meals[mealType]) data.meals[mealType]=[];
  data.meals[mealType].push({idx:'c-'+Date.now(),name:nEl.value.trim(),kcal:parseInt(kEl.value)||0,prot:parseInt(pEl.value)||0,custom:true});
  savePersonDag(personId,data);
  renderDag();
}

function removeCustomMeal(personId,mealType,idx){
  const data=loadPersonDag(personId);
  if(data.meals[mealType]) data.meals[mealType]=data.meals[mealType].filter(m=>m.idx!==idx);
  savePersonDag(personId,data);
  renderDag();
}

function toggleTracker(personId){ openTracker=openTracker===personId?null:personId; openMoment=null; renderDag(); }
function toggleCustomForm(personId,mealType){ const k=personId+'-'+mealType; openCustomForm[k]=!openCustomForm[k]; renderDag(); }

function renderDag(){
  const profiles = getProfiles().length ? getProfiles() : getDefaultProfiles();
  const today = new Date();
  const dateStr = today.toLocaleDateString('nl-NL',{weekday:'long',day:'numeric',month:'long'});
  const famKcal = profiles.reduce((s,p)=>s+calcPersonTotal(p.id).kcal, 0);
  const famGoal = profiles.reduce((s,p)=>s+(p.kcalTarget||2000), 0);

  let html = `<div class="dag-top">
    <div class="dag-top-row">
      <div class="dag-top-title">📅 ${dateStr.charAt(0).toUpperCase()+dateStr.slice(1)}</div>
      <div style="display:flex;gap:6px">
        <button onclick="openScanner({type:'dag',mealType:'snack'})" style="background:linear-gradient(135deg,#2ECC71,#27AE60);border:none;border-radius:20px;padding:5px 11px;color:#fff;font-size:11px;font-weight:700;cursor:pointer">📷 Scan</button>
        <button class="dag-reset-btn" onclick="if(confirm('Reset alle innames?')){profiles.forEach(p=>localStorage.removeItem(getDagKey(p.id)));renderDag();}">Reset</button>
      </div>
    </div>
    <div class="dag-totals">
      <div class="dag-total"><div class="v">${famKcal}</div><div class="l">Gegeten gezin</div></div>
      <div class="dag-total"><div class="v">${famGoal > famKcal ? famGoal-famKcal : 0}</div><div class="l">Nog over</div></div>
      <div class="dag-total"><div class="v">${famKcal > famGoal ? famKcal-famGoal : 0}</div><div class="l">${famKcal > famGoal ? '⚠️ Te veel' : 'Op schema'}</div></div>
    </div>
  </div>`;

  profiles.forEach(p => {
    const tracking = isTracking(p.id);
    const totals = calcPersonTotal(p.id);
    const kcalGoal = p.kcalTarget || 2000;
    const protGoal = p.protTarget || 100;
    const kcalLeft = kcalGoal - totals.kcal;
    const pct = Math.min(100, Math.round(totals.kcal/kcalGoal*100));
    const isOver = totals.kcal > kcalGoal;
    const isWarn = pct > 85 && !isOver;
    const isOpen = openTracker === p.id;

    html += `<div class="person-dag-card${isOpen?' open':''}">
      <div class="person-dag-head" onclick="toggleTracker('${p.id}')">
        <div class="person-dag-emoji">${p.emoji}</div>
        <div class="person-dag-info">
          <div class="person-dag-name">${p.name}</div>
          <div class="person-dag-sub">${tracking ? `Doel: ${kcalGoal} kcal · ${protGoal}g eiwit` : 'Tracking uit — tik om in te stellen'}</div>
        </div>
        <div class="person-dag-right">
          <div class="person-dag-kcal ${isOver?'over':isWarn?'warn':'ok'}">${totals.kcal} kcal</div>
          <div class="person-dag-left">${isOver?'⚠️ '+Math.abs(kcalLeft)+' te veel':kcalLeft+' over'}</div>
          <div style="font-size:10px;color:var(--muted);font-weight:500">${totals.prot}g / ${protGoal}g eiwit</div>
        </div>
      </div>
      <div class="prog-wrap">
        <div class="prog-bar"><div class="prog-fill${isOver?' over':isWarn?' warn':''}" style="width:${pct}%"></div></div>
      </div>`;

    if(isOpen){
      html += `<div class="person-dag-body">
        <div class="tracking-toggle">
          <span class="tracking-lbl">Dagtracking bijhouden</span>
          <button class="toggle-switch${tracking?' on':''}" onclick="toggleTracking('${p.id}')"></button>
        </div>`;

      if(tracking){
        MEAL_MOMENTS.forEach(m => {
          html += renderMoment(p, m);
        });
        html += `<button onclick="if(confirm('Reset ${p.name}?')){localStorage.removeItem(getDagKey('${p.id}'));renderDag();}" style="width:100%;padding:7px;border-radius:var(--rsm);background:none;border:1.5px solid var(--border2);color:var(--muted);font-size:11px;cursor:pointer;font-weight:600;margin-top:8px">Reset ${p.name}</button>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  });

  document.getElementById('dag-scroll').innerHTML = html;
}



</script>
</body>
</html>
